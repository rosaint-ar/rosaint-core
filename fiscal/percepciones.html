<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percepciones · Rosaint CORE</title>
  <meta name="app-root" content="../">
  <link rel="icon" type="image/svg+xml" href="../shell/logo.svg">
  <link rel="stylesheet" href="../shell/shell.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* ---- Zona de drop del PDF ---- */
    .drop {
      display: block;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius); padding: 28px;
      text-align: center; background: var(--surface);
      cursor: pointer; transition: border-color .15s, background .15s, color .15s;
      color: var(--muted);
    }
    .drop:hover { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }
    .drop.ok {
      border-style: solid; border-color: var(--ok);
      background: color-mix(in srgb, var(--ok) 10%, transparent);
      color: var(--ok);
    }
    .drop-title { font-size: 15px; font-weight: 600; }
    .drop-hint { font-size: 12px; margin-top: 6px; color: var(--muted); }
    input[type=file] { display: none; }

    /* ---- Status bar ---- */
    .status-bar {
      font-size: 13px; color: var(--muted);
      margin: 14px 2px; min-height: 18px;
      display: flex; align-items: center; gap: 6px;
    }
    .status-bar.err { color: var(--hot); }
    .status-bar.ok { color: var(--ok); }
    .status-bar .dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 4px;
    }
    .status-bar .dot.load { background: var(--warn); }
    .status-bar .dot.on   { background: var(--ok); }
    .status-bar .dot.off  { background: var(--hot); }

    /* ---- Vista previa estilo factura ---- */
    .invoice {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-top: 14px;
    }
    .inv-head {
      padding: 16px 18px; border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; font-size: 13px;
    }
    .inv-head .k { color: var(--muted); }
    .inv-head .v { font-weight: 500; color: var(--text); }
    .inv-head .full {
      grid-column: 1 / -1; font-size: 16px; font-weight: 700; margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    /* ---- Tabla de percepciones dentro de la factura ---- */
    .invoice table { width: 100%; border-collapse: collapse; }
    .invoice th {
      text-align: left; font-size: 11px; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted); background: var(--surface-2);
      padding: 9px 14px; border-bottom: 1px solid var(--border); font-weight: 600;
    }
    .invoice td {
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      font-size: 13px; vertical-align: top;
    }
    .invoice td.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ---- Chips de impuestos ---- */
    .tax-chip {
      display: inline-block; background: var(--accent-tint); color: var(--accent);
      font-size: 11px; padding: 2px 9px; border-radius: 20px;
      margin: 2px 3px 2px 0; font-weight: 500;
    }
    .tax-chip.warn {
      background: color-mix(in srgb, var(--warn) 15%, transparent);
      color: var(--warn); cursor: help;
    }
    .tax-chip.miss {
      background: color-mix(in srgb, var(--hot) 12%, transparent);
      color: var(--hot);
    }

    /* ---- Totales ---- */
    .totales {
      padding: 14px 18px; background: var(--surface-2);
      border-top: 1px solid var(--border);
    }
    .totales .row {
      display: flex; justify-content: flex-end; gap: 24px;
      padding: 3px 0; font-size: 13px;
    }
    .totales .row .lbl { color: var(--muted); min-width: 220px; text-align: right; }
    .totales .row .val { min-width: 130px; text-align: right; font-variant-numeric: tabular-nums; }
    .totales .row.total {
      font-size: 16px; font-weight: 700;
      border-top: 1px solid var(--border);
      margin-top: 6px; padding-top: 8px;
    }
    .totales .row.perc .lbl,
    .totales .row.perc .val { color: var(--warn); }

    /* ---- Alertas ---- */
    .alerta {
      background: color-mix(in srgb, var(--warn) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--warn) 32%, transparent);
      border-radius: var(--radius-sm); padding: 10px 14px;
      margin: 12px 0; font-size: 13px; color: var(--warn);
    }
    .alerta.err {
      background: color-mix(in srgb, var(--hot) 10%, transparent);
      border-color: color-mix(in srgb, var(--hot) 32%, transparent);
      color: var(--hot);
    }
    .alerta.ok {
      background: color-mix(in srgb, var(--ok) 12%, transparent);
      border-color: color-mix(in srgb, var(--ok) 32%, transparent);
      color: var(--ok);
    }
    .alerta b { color: inherit; }

    .actions-row {
      display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end;
    }
  </style>
</head>
<body data-page="percepciones" data-title="Reconocedor de percepciones" data-subtitle="Leé la factura PDF · mapea · agrupa · aplica en Odoo">

<div id="app-shell"></div>

<main id="app-content">

  <div class="card">
    <label class="drop" id="drop" for="filePdf">
      <div class="drop-title">Soltá acá la factura PDF o hacé clic para elegir</div>
      <div class="drop-hint">Funciona con PDFs de texto (Mercado Libre, Google, plataformas…)</div>
    </label>
    <input type="file" id="filePdf" accept="application/pdf">
  </div>

  <div class="status-bar" id="status"><span class="dot off"></span>Esperando una factura.</div>

  <div id="preview"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase.js"></script>
<script src="../shell/shell.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// Reconocedor de percepciones
// Toma un PDF de factura, extrae las líneas de percepciones, las matchea contra
// los impuestos vivos de Odoo (via edge function), y aplica en el borrador.
// ═══════════════════════════════════════════════════════════════════════════

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const $ = (id) => document.getElementById(id);
const SB_URL = () => window.SUPABASE_URL;
const SB_KEY = () => window.SUPABASE_KEY;
const FN_URL = () => window.ODOO_FN_URL;

let listaImpuestos = [];
let impuestosParseados = [];

function setStatus(dot, msg, cls = '') {
  $('status').innerHTML = `<span class="dot ${dot}"></span>${msg}`;
  $('status').className = 'status-bar ' + cls;
}
const money = (n) => '$ ' + (n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
function norm(s){ return (s||'').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim(); }

// De un nombre de impuesto Odoo extrae tipo/provincia/resolución/alcance
function parseImpuesto(name) {
  const n = name || '';
  if (/IVA/i.test(n) && !/IIBB/i.test(n)) {
    return { tipo:'IVA', prov:null, res:null, alcance: /especial/i.test(n)?'especial':'general' };
  }
  const m = n.match(/IIBB\s+(.+?)\s*[–-]\s*(.+)$/);
  if (m) {
    // Limpiar paréntesis del prov: "CABA (AGIP)" → "CABA"
    const prov = m[1].trim().replace(/\s*\(.*?\)\s*/g, '').trim();
    const resto = m[2].trim();
    const rm = resto.match(/(?:RG|RES\.?|R\.?)\s*([\d/]+)/i);
    return { tipo:'IIBB', prov, res: rm? rm[1].replace(/\/.*$/,'') : null, alcance: /esp|elec/i.test(resto)?'especial':'general' };
  }
  return { tipo:'?', prov:null, res:null, alcance:'general' };
}

// Diccionario de sinónimos de jurisdicción. Mapea nombres cortos, alias, organismos,
// abreviaturas al nombre canónico. Se usa tanto para matchear en el PDF como para
// normalizar nombres de Odoo.
// Los separadores toleran punto (Cap. Federal), espacio o guión.
const SEP = '[\\s.\\-]*';
const SEP1 = '[\\s.\\-]+';
const SINONIMOS_PROV = [
  { canon: 'CABA', re: new RegExp(`\\b(CAP${SEP}FEDERAL|CAPITAL${SEP1}FEDERAL|CABA|C${SEP}A${SEP}B${SEP}A|CIUDAD${SEP1}(?:AUT[OÓ]NOMA${SEP1}DE${SEP1})?BUENOS${SEP1}AIRES|AGIP)\\b`, 'i') },
  { canon: 'Buenos Aires', re: new RegExp(`\\b(BUENOS${SEP1}AIRES|BS${SEP}AS|PROV(?:INCIA)?${SEP1}(?:DE${SEP1})?BS${SEP}AS|PBA|ARBA)\\b`, 'i') },
  { canon: 'Santa Fe',   re: new RegExp(`\\b(SANTA${SEP1}FE|API${SEP1}SANTA${SEP1}FE|API)\\b`, 'i') },
  { canon: 'Córdoba',    re: /\b(C[OÓ]RDOBA|CBA)\b/i },
  { canon: 'Mendoza',    re: /\b(MENDOZA|ATM)\b/i },
  { canon: 'Chaco',      re: /\bCHACO\b/i },
  { canon: 'Misiones',   re: /\bMISIONES\b/i },
  { canon: 'Tucumán',    re: /\b(TUCUM|DGR[\s.\-]+TUCUM)/i },
  { canon: 'Entre Ríos', re: new RegExp(`\\b(ENTRE${SEP1}R[IÍ]OS|ATER)\\b`, 'i') },
  { canon: 'Salta',      re: /\bSALTA\b/i },
  { canon: 'Neuquén',    re: /\b(NEUQU|DPR[\s.\-]+NEUQU)/i },
  { canon: 'Río Negro',  re: new RegExp(`\\bR[IÍ]O${SEP1}NEGRO\\b`, 'i') },
  { canon: 'Jujuy',      re: /\bJUJUY\b/i },
  { canon: 'La Rioja',   re: new RegExp(`\\bLA${SEP1}RIOJA\\b`, 'i') },
  { canon: 'Chubut',     re: /\bCHUBUT\b/i },
  { canon: 'Formosa',    re: /\bFORMOSA\b/i },
  { canon: 'Corrientes', re: /\bCORRIENTES\b/i },
  { canon: 'San Juan',   re: new RegExp(`\\bSAN${SEP1}JUAN\\b`, 'i') },
  { canon: 'San Luis',   re: new RegExp(`\\bSAN${SEP1}LUIS\\b`, 'i') },
  { canon: 'La Pampa',   re: new RegExp(`\\bLA${SEP1}PAMPA\\b`, 'i') },
  { canon: 'Santa Cruz', re: new RegExp(`\\bSANTA${SEP1}CRUZ\\b`, 'i') },
  { canon: 'Tierra del Fuego', re: new RegExp(`\\bTIERRA${SEP1}DEL${SEP1}FUEGO\\b`, 'i') },
  { canon: 'Catamarca',  re: /\bCATAMARCA\b/i },
  { canon: 'Santiago del Estero', re: new RegExp(`\\bSANTIAGO${SEP1}DEL${SEP1}ESTERO\\b`, 'i') },
];
function detectarJurisdiccion(texto) {
  const t = String(texto || '');
  for (const s of SINONIMOS_PROV) {
    if (s.re.test(t)) return s.canon;
  }
  return null;
}

async function cargarImpuestosOdoo() {
  const r = await fetch(FN_URL(), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SB_KEY(),
      Authorization: 'Bearer ' + SB_KEY(),
    },
    body: JSON.stringify({ modo: 'contabilidad', que: 'impuestos' }),
  });
  const d = await r.json();
  if (!d.ok) throw new Error('No se pudieron leer impuestos de Odoo: ' + (d.error||''));
  listaImpuestos = d.data || [];
  impuestosParseados = listaImpuestos
    .filter(t => /Percep|IIBB|P\. IIBB/i.test(t.name))
    .map(t => ({
      id: t.id, name: t.name,
      group_id: Array.isArray(t.tax_group_id) ? t.tax_group_id[0] : null,
      group_name: Array.isArray(t.tax_group_id) ? t.tax_group_id[1] : '',
      ...parseImpuesto(t.name),
    }));
  // IVAs de compra (por grupo VAT NN% o IVA NN%, o por nombre "IVA 21%").
  ivasOdoo = listaImpuestos
    .filter(t => {
      const gname = Array.isArray(t.tax_group_id) ? String(t.tax_group_id[1] || '') : '';
      return /^VAT\s*\d/i.test(gname) || /^IVA\s*\d/i.test(gname) || /^IVA\s+\d/i.test(t.name);
    })
    .map(t => ({ id: t.id, name: t.name, amount: Number(t.amount || 0) }));
}
let ivasOdoo = [];

// ─── Extraer texto del PDF ───
async function extraerTextoPdf(arrayBuffer) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let lineas = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    // Agrupar por Y con tolerancia: dos items con Y que difiere en ≤2px van a la
    // misma línea. Google Ads y otros PDFs suelen tener diferencias de fracción
    // por baseline que rompen la agrupación exacta.
    const items = tc.items.map(it => ({ x: it.transform[4], y: it.transform[5], s: it.str }))
                          .sort((a,b) => b.y - a.y);
    const grupos = [];
    for (const it of items) {
      const g = grupos.find(g => Math.abs(g.y - it.y) <= 2);
      if (g) g.items.push(it);
      else grupos.push({ y: it.y, items: [it] });
    }
    grupos.forEach(g => {
      const linea = g.items.sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ').replace(/\s+/g,' ').trim();
      if (linea) lineas.push(linea);
    });
  }
  return lineas;
}

// ─── Parseo de encabezado y líneas con monto ───
function parseMontoFinal(s){
  let m = s.match(/(\d{1,3}(?:\.\d{3})*,\d{2})\s*$/);
  if(m) return parseFloat(m[1].replace(/\./g,'').replace(',','.'));
  m = s.match(/(\d+\.\d{2})\s*$/);
  if(m) return parseFloat(m[1]);
  m = s.match(/(\d+),(\d{2})\s*$/);
  if(m) return parseFloat(m[1]+'.'+m[2]);
  return null;
}
function detectarTipoComprobante(texto, lineas) {
  // Letra: A / B / C / E / M — buscar palabra suelta en las primeras 20 líneas
  const primeras = lineas.slice(0, 25).join('\n').toUpperCase();
  let letra = null;
  // Muchos PDFs ponen la letra en una línea sola tipo "A" o "COD. 01"
  const mLetra = primeras.match(/^\s*(A|B|C|E|M)\s*$/m);
  if (mLetra) letra = mLetra[1];
  // Código AFIP típico (01=Fact A, 06=Fact B, 11=Fact C, 03=NC A, 08=NC B, 13=NC C)
  const mCod = primeras.match(/\b(?:C[ÓO]?D(?:IGO)?\.?|CÓD\.?|COD)\.?\s*[:N°º]?\s*(\d{2,3})\b/);
  const cod = mCod ? mCod[1].padStart(3, '0') : null;
  // Determinar tipo textual
  let tipo = null;
  if (/NOTA\s+DE\s+CR[ÉE]DITO/.test(primeras) || /^\s*N\.?\s*C[ÓO]?\s+/.test(primeras)) tipo = 'NC';
  else if (/NOTA\s+DE\s+D[ÉE]BITO/.test(primeras) || /^\s*N\.?\s*D[ÉE]?\s+/.test(primeras)) tipo = 'ND';
  else if (/FACTURA/.test(primeras)) tipo = 'FC';
  else if (/RECIBO/.test(primeras)) tipo = 'RC';
  // Inferir letra desde código si no la detectamos
  if (!letra && cod) {
    const codLetra = { '001':'A','002':'A','003':'A','004':'A','005':'A',
                       '006':'B','007':'B','008':'B','009':'B','010':'B',
                       '011':'C','012':'C','013':'C','015':'C',
                       '019':'E','021':'E','081':'A','082':'B','083':'C','118':'M' };
    if (codLetra[cod]) letra = codLetra[cod];
  }
  const label = [
    tipo === 'NC' ? 'Nota de Crédito' :
    tipo === 'ND' ? 'Nota de Débito' :
    tipo === 'RC' ? 'Recibo' :
    tipo === 'FC' ? 'Factura' : 'Comprobante',
    letra || '?'
  ].join(' ');
  return { letra, codigo: cod, tipo, label };
}

function parsearFactura(lineas) {
  const texto = lineas.join('\n');
  const cuitProv = (texto.match(/C\.?U\.?I\.?T\.?:?\s*([\d]{2}-?[\d]{8}-?[\d])/i)||[])[1] || '';
  // Nº comprobante: tolera espacios alrededor del guion (Google escribe "0011 - 01342819",
  // Mercado Libre lo pega "0011-01342819"). Prioriza el que viene tras "N°"; el fallback
  // exige punto de venta de 4-5 dígitos para no confundir con el Nº de Ingresos Brutos
  // del proveedor (ej. "901-2188512").
  let comprobante = '';
  const mComp = texto.match(/N[°º]\s*:?\s*(\d{3,5})\s*-\s*(\d{6,12})/i)
             || texto.match(/\b(\d{4,5})\s*-\s*(\d{7,12})\b/);
  if (mComp) comprobante = mComp[1] + '-' + mComp[2];
  const fecha = (texto.match(/emisi[oó]n:\s*([\d.\/]{8,10})/i) || texto.match(/fecha:\s*([\d.\/]{8,10})/i) || [])[1] || '';
  const tipoComp = detectarTipoComprobante(texto, lineas);
  const conMonto = [];
  lineas.forEach((l, idx) => {
    const monto = parseMontoFinal(l);
    if (monto !== null) {
      const concepto = l.replace(/\$?\s*[\d.]*[,.]\d{2}\s*$/,'').replace(/\$/g,'').trim();
      conMonto.push({ concepto, monto, raw: l, idx });
    }
  });
  // Detectar Total: puede aparecer como "Total $X,XX" en la misma línea,
  // o como "Total" y el monto en la siguiente línea (formato ML/Perfit).
  let total = null;
  for (let i = 0; i < lineas.length; i++) {
    const l = lineas[i].trim();
    if (/^total(?:\s+a\s+pagar)?\s*[:\-]?\s*$/i.test(l)) {
      const m = parseMontoFinal(lineas[i + 1] || '');
      if (m !== null) { total = m; break; }
    }
    const m2 = l.match(/\btotal(?:\s+a\s+pagar)?\s*[:\-]?\s*\$?\s*([\d.,]+)\s*$/i);
    if (m2) {
      const val = parseFloat(m2[1].replace(/\./g, '').replace(',', '.')) || parseFloat(m2[1]);
      if (!isNaN(val) && val > 0) { total = val; break; }
    }
  }
  const { neto, ivas } = detectarNetoIva(conMonto, total, lineas);
  return { cuitProv, comprobante, fecha, tipoComp, conMonto, neto, ivas, total };
}

// Detecta subtotal (neto) e IVA con alícuota.
// - IVA: tolera paréntesis, guiones y espacios entre "IVA" y la alícuota.
// - Neto: busca palabras clave. Si no aparece (facturas ML/Perfit), calcula
//   neto = total - suma(IVA) - suma(percepciones).
function detectarNetoIva(conMonto, total, lineasCompletas) {
  // NORM: normaliza "I.V.A." → "IVA" antes de convertir puntos a espacios,
  // así no perdemos la palabra IVA.
  const NORM = s => String(s || '')
    .toUpperCase()
    .replace(/\bI\.?V\.?A\.?/g, 'IVA')
    .replace(/[.,]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  const RE_NETO = /(?:^|\b)(SUBTOTAL|IMPORTE\s+NETO|IMP\s+NETO|NETO\s+GRAVADO|BASE\s+IMPONIBLE|NETO(?:\s+GRAV\w*)?)(?:\s+21|\s+10\s*5|\s+27|\s+5)?\b/;
  // IVA tolerante: acepta "IVA 21%", "IVA (21%)", "IVA INSC 21%", "IVA - 21%", etc.
  const RE_IVA  = /\bIVA\b[^\d]{0,30}?(21|10\s*5|27|5|2\s*5)\s*%?/;
  const RE_EXCLUIR_IVA = /PERCEP|RETENC|\bPERC\b|\bRET\b|PER\s+IVA/;
  const RE_PERC = /PERCEP|RETENC|\bPERC\b|\bRET\b/;
  const RE_SUBTOTAL_SUELTO = /^(SUBTOTAL|IMPORTE\s+NETO|IMP\s+NETO|NETO\s+GRAVADO|BASE\s+IMPONIBLE|NETO(?:\s+GRAV\w*)?)\s*[:\-]?\s*$/;
  // IVA suelto: "IVA 21,00%" (queda "IVA 21 00%" tras NORM), "IVA INSC 21%", "IVA (21%)", etc.
  // La alícuota es OBLIGATORIA en el match: así descartamos "IVA: Responsable Inscripto".
  const RE_IVA_SUELTO = /^IVA\b[^\d]{0,20}(21|10\s*5|27|5|2\s*5)\b/;

  const netos = [];
  const ivas = [];
  for (const x of conMonto) {
    const n = NORM(x.concepto);
    // Excluir líneas de "Regímenes Especiales" o "Total percepciones" (son subtotales,
    // no percepciones individuales). También excluir "TOTAL" que no sea "TOTAL NETO/GRAVADO".
    if (/REGIMENES?\s+ESPECIALES?|TOTAL\s+PERCEP|SUMA\s+PERCEP/.test(n)) continue;
    if (RE_NETO.test(n) && !/\bTOTAL\b(?!\s+NETO|\s+GRAVADO)/.test(n)) {
      netos.push(x.monto);
      continue;
    }
    const m = n.match(RE_IVA);
    if (m && !RE_EXCLUIR_IVA.test(n)) {
      const alicuota = parseFloat(m[1].replace(/\s+/g, '.'));
      ivas.push({ alicuota, monto: x.monto });
      continue;
    }
  }
  // Fallback multi-línea: pdfjs a veces fragmenta "IVA 21,00% 5.217,51" en varias
  // líneas separadas por columnas, y en algunos casos (Google Ads) el monto queda
  // ANTES de la etiqueta "IVA 21%". Buscamos en ±3 líneas alrededor.
  if (Array.isArray(lineasCompletas)) {
    const buscarMontoCerca = (i) => {
      // Prioriza vecinos inmediatos y avanza. Devuelve el primer monto plausible.
      const orden = [-1, 1, -2, 2, -3, 3];
      for (const off of orden) {
        const idx = i + off;
        if (idx < 0 || idx >= lineasCompletas.length) continue;
        const lineaCruda = lineasCompletas[idx];
        const nSig = NORM(lineaCruda);
        // Evitar tomar el monto de una línea que sea a su vez otro concepto (percepción, total, etc.)
        if (/PERCEP|RETENC|\bPERC\b|\bRET\b|TOTAL|REGIMEN/.test(nSig)) continue;
        // La línea debe ser básicamente un monto (con posible signo/moneda), no un concepto largo.
        const soloMonto = /^\$?\s*[\d.]{1,15},\d{2}\s*$/.test(lineaCruda.trim());
        if (!soloMonto) continue;
        const mM = parseMontoFinal(lineaCruda);
        if (mM !== null && mM > 0) return mM;
      }
      return null;
    };
    const buscarAlicuotaCerca = (i) => {
      const orden = [-1, 1, -2, 2, -3, 3];
      for (const off of orden) {
        const idx = i + off;
        if (idx < 0 || idx >= lineasCompletas.length) continue;
        const sig = NORM(lineasCompletas[idx]);
        const mA = sig.match(/^(21|10\s*5|27|5|2\s*5)\s*%?\s*$/);
        if (mA) return parseFloat(mA[1].replace(/\s+/g,'.'));
      }
      return null;
    };
    for (let i = 0; i < lineasCompletas.length; i++) {
      const n = NORM(lineasCompletas[i]);
      if (RE_EXCLUIR_IVA.test(n)) continue;
      const mIva = n.match(RE_IVA_SUELTO);
      // Es "IVA suelto" solo si la línea no tenía monto propio (si tenía, ya se
      // procesó en el bucle de conMonto).
      const tieneMontoPropio = /\d[\d.]*,\d{2}\s*$/.test(lineasCompletas[i].trim());
      if (mIva && !tieneMontoPropio) {
        let alic = mIva[1] ? parseFloat(mIva[1].replace(/\s+/g,'.')) : null;
        if (alic === null) alic = buscarAlicuotaCerca(i);
        const monto = buscarMontoCerca(i);
        if (alic && monto && !ivas.some(x => Math.abs(x.monto - monto) < 0.01)) {
          ivas.push({ alicuota: alic, monto });
        }
      }
      if (RE_SUBTOTAL_SUELTO.test(n)) {
        const monto = buscarMontoCerca(i);
        if (monto !== null && !netos.some(v => Math.abs(v - monto) < 0.01)) {
          netos.push(monto);
        }
      }
    }
  }
  // Si hay múltiples subtotales detectados (típico de Google Ads: uno con IVA
  // incluido y otro neto), tomar el que sea coherente con: neto + IVA = otro_subtotal.
  let neto = null;
  if (netos.length === 1) {
    neto = netos[0];
  } else if (netos.length > 1) {
    const sumaIva = ivas.reduce((a,b)=>a + b.monto, 0);
    // Buscar el par (menor, mayor) tal que menor + iva = mayor
    let mejor = null; let mejorDif = Infinity;
    for (let i = 0; i < netos.length; i++) {
      for (let j = 0; j < netos.length; j++) {
        if (i === j) continue;
        const dif = Math.abs(netos[i] + sumaIva - netos[j]);
        if (dif < mejorDif) { mejorDif = dif; mejor = netos[i]; }
      }
    }
    // Si la ecuación no cuadra bien, fallback: tomar el subtotal más chico (más probable neto puro)
    neto = mejorDif < 2 ? mejor : Math.min(...netos);
  }
  return { neto, ivas };
}

function esPercepcion(concepto) {
  const n = norm(concepto);
  return /PERCEP|RETENC|\bPERC\b|\bRET\b|PER\.?\s*IVA|PER\.?\s*IIBB/.test(n);
}

// Busca impuesto Odoo que matchee: provincia + (resolución si la hay) + alcance
function matchImpuesto(attr) {
  if (attr.tipo === 'IVA') {
    return impuestosParseados.find(t => t.tipo==='IVA' && t.alcance===attr.alcance)
        || impuestosParseados.find(t => t.tipo==='IVA' && t.alcance==='general') || null;
  }
  const cands = impuestosParseados.filter(t => t.tipo==='IIBB' && attr.prov && norm(t.prov)===norm(attr.prov));
  if (!cands.length) {
    return attr.prov ? { _faltaRes: true, prov: attr.prov, res: attr.res } : null;
  }
  if (attr.res) {
    const conRes = cands.find(t => t.res && t.res === attr.res);
    if (conRes) return conRes;
  }
  const general = cands.find(t => t.alcance==='general');
  const especial = cands.find(t => t.alcance==='especial');
  if (attr.alcance === 'especial') return especial || general || cands[0];
  return general || cands[0];
}

// Clasificación por REGLAS: provincia + resolución + alcance
function clasificarReglas(concepto) {
  const n = norm(concepto);
  if (/(PERC?\.?|PERCEP\w*|RET\.?)\s*\.?\s*(IVA|VALOR AGREGADO)|(IVA|VALOR AGREGADO)\s*[-.]?\s*(PERC|RET|RG)/.test(n) && !/IIBB|INGRESOS BRUTOS|ING\.? BRUTOS/.test(n)) {
    return { tipo:'IVA', prov:null, res:null, alcance: /ESPECIAL/.test(n)?'especial':'general' };
  }
  // Detectar jurisdicción usando el diccionario global de sinónimos.
  const provincias = [...new Set(impuestosParseados.filter(t=>t.prov).map(t=>t.prov))];
  const canonDetectada = detectarJurisdiccion(n);
  let provDetectada = null;
  if (canonDetectada) {
    // Match contra las provincias de Odoo (que también pueden tener sinónimos).
    provDetectada = provincias.find(p => {
      const pCanon = detectarJurisdiccion(p) || p;
      return pCanon === canonDetectada || norm(p) === norm(canonDetectada);
    }) || null;
  }
  if (!provDetectada) {
    // Fallback legado: por si un tax de Odoo tiene un nombre raro que no matchea sinónimos.
    for (const pr of provincias) {
      const prN = norm(pr);
      if (n.includes(prN)) { provDetectada = pr; break; }
    }
  }
  const rm = n.match(/(?:RG|RES\.?|RESOLUCION|NORMA|R\.?)\s*N?[°º]?\s*(\d+)/);
  const res = rm ? rm[1] : null;
  const alcance = /ESPECIAL|ELECTRONICO|COM\.?\s*ELEC/.test(n) ? 'especial' : 'general';
  return { tipo:'IIBB', prov: provDetectada, res, alcance };
}

// Agrupa percepciones por impuesto Odoo (tax_id): resoluciones con impuesto propio quedan separadas
function agrupar(percepciones) {
  const grupos = {};
  percepciones.forEach(p => {
    if (!p.mapeo || !p.mapeo.odoo_tax_id) {
      const k = '_SIN_MAPEO';
      (grupos[k] = grupos[k] || { lineas:[], monto:0, sinMapeo:true }).lineas.push(p);
      grupos[k].monto += p.monto; return;
    }
    const key = 'tax_' + p.mapeo.odoo_tax_id;
    if (!grupos[key]) grupos[key] = {
      tipo: p.mapeo.tipo, jurisdiccion: p.mapeo.jurisdiccion,
      alcance: p.mapeo.alcance, res: p.mapeo.res,
      tax_id: p.mapeo.odoo_tax_id, tax_name: p.mapeo.odoo_tax_name,
      group_name: p.mapeo.odoo_group_name,
      lineas: [], monto: 0,
    };
    grupos[key].lineas.push(p); grupos[key].monto += p.monto;
  });
  return grupos;
}

$('filePdf').addEventListener('change', async (e) => {
  const f = e.target.files[0]; if (!f) return;
  $('drop').classList.add('ok');
  $('drop').querySelector('.drop-title').textContent = '✓ ' + f.name;
  try {
    setStatus('load', 'Leyendo impuestos de Odoo en vivo…');
    await cargarImpuestosOdoo();
    setStatus('load', 'Leyendo el PDF…');
    const buf = await f.arrayBuffer();
    const lineas = await extraerTextoPdf(buf);
    const fac = parsearFactura(lineas);
    window._debugFactura = { lineas, fac };
    console.log('=== DEBUG PDF ===');
    console.log('Total líneas extraídas:', lineas.length);
    console.log('Todas las líneas:', lineas);
    console.log('Líneas con monto:', fac.conMonto);
    console.log('Subtotal detectado:', fac.neto);
    console.log('IVAs detectados:', fac.ivas);

    const percLineas = fac.conMonto.filter(x => esPercepcion(x.concepto));
    setStatus('load', `Encontradas ${percLineas.length} percepciones. Reconociendo…`);

    percLineas.forEach(p => {
      const attr = clasificarReglas(p.concepto);
      p.attr = attr;
      const m = matchImpuesto(attr);
      if (m && m._faltaRes) {
        p.faltaCrear = { tipo:'IIBB', jurisdiccion: m.prov, res: m.res, alcance: attr.alcance };
      } else if (m) {
        p.mapeo = {
          odoo_tax_id: m.id, odoo_tax_name: m.name, odoo_group_name: m.group_name,
          tipo: m.tipo, jurisdiccion: m.prov, alcance: m.alcance, res: m.res,
        };
      } else {
        p.sinMapeo = true;
      }
    });

    const grupos = agrupar(percLineas);
    renderPreview(fac, percLineas, grupos);
    const faltan = percLineas.filter(p=>p.faltaCrear).length;
    const sin = percLineas.filter(p=>p.sinMapeo).length;
    setStatus(
      (faltan||sin) ? 'load' : 'on',
      faltan ? `${faltan} percepción(es) necesitan crearse en Odoo.`
        : sin ? `${sin} sin reconocer.`
        : 'Todas reconocidas y desglosadas.',
      (faltan||sin) ? '' : 'ok'
    );
  } catch (err) {
    setStatus('off', 'Error: ' + err.message, 'err');
  }
});

function renderPreview(fac, percLineas, grupos) {
  const gruposArr = Object.values(grupos);
  const totalPerc = percLineas.reduce((a,p)=>a+p.monto,0);

  const tc = fac.tipoComp || {};
  let h = `<div class="invoice">
    <div class="inv-head">
      <div class="full">${esc(tc.label || 'Comprobante')}</div>
      <div><span class="k">CUIT proveedor:</span> <span class="v">${fac.cuitProv||'—'}</span></div>
      <div><span class="k">Nº comprobante:</span> <span class="v">${fac.comprobante||'—'}</span></div>
      <div><span class="k">Fecha:</span> <span class="v">${fac.fecha||'—'}</span></div>
      <div><span class="k">Tipo:</span> <span class="v">${esc(tc.label || '—')}${tc.codigo ? ' <span style="color:var(--muted); font-size:11px;">(cód. '+tc.codigo+')</span>' : ''}</span></div>
    </div>`;

  h += `<table><thead><tr>
    <th>Texto en factura</th><th>Reconocido como</th><th class="num">Monto</th>
  </tr></thead><tbody>`;
  percLineas.forEach((p) => {
    let chip;
    if (p.mapeo) chip = `<span class="tax-chip">${p.mapeo.odoo_tax_name}</span>`;
    else if (p.faltaCrear) {
      const fc = p.faltaCrear;
      chip = `<span class="tax-chip miss">⚠ Falta crear: IIBB ${fc.jurisdiccion} ${fc.res?'Res. '+fc.res:fc.alcance}</span>`;
    } else {
      chip = `<span class="tax-chip warn">⚠ No reconocida — asignar a mano</span>`;
    }
    h += `<tr><td>${p.concepto}</td><td>${chip}</td><td class="num">${money(p.monto)}</td></tr>`;
  });
  h += `</tbody></table>`;

  // Bloque de totales en ORDEN VISUAL claro: Subtotal → IVA → Percepciones → Total.
  const sumaIva = (fac.ivas || []).reduce((s,v)=>s+v.monto, 0);
  const netoLabel = fac.neto != null ? money(fac.neto) : '<span style="color:#dc3545;">no detectado</span>';
  h += `<div class="totales">`;
  h += `<div class="row"><span class="lbl">Subtotal (neto):</span><span class="val">${netoLabel}</span></div>`;
  if ((fac.ivas||[]).length === 0) {
    h += `<div class="row"><span class="lbl">IVA:</span><span class="val" style="color:#dc3545;">no detectado</span></div>`;
  } else {
    (fac.ivas || []).forEach(v => {
      h += `<div class="row"><span class="lbl">IVA ${v.alicuota}%:</span><span class="val">${money(v.monto)}</span></div>`;
    });
  }
  // Separador visual antes de percepciones
  if (gruposArr.filter(g=>!g.sinMapeo).length) {
    h += `<div class="row" style="height:6px;"></div>`;
  }
  gruposArr.filter(g=>!g.sinMapeo).forEach(g => {
    const detalle = g.lineas.length > 1
      ? ` <span style="font-size:11px;color:var(--muted);">(${g.lineas.length} sumadas)</span>`
      : '';
    h += `<div class="row perc"><span class="lbl">${g.tax_name}:${detalle}</span><span class="val">${money(g.monto)}</span></div>`;
  });
  if (grupos['_SIN_MAPEO']) {
    h += `<div class="row perc"><span class="lbl">⚠ Sin mapear:</span><span class="val">${money(grupos['_SIN_MAPEO'].monto)}</span></div>`;
  }
  // Total factura (fuente de verdad del PDF)
  h += `<div class="row" style="height:6px;"></div>`;
  h += `<div class="row total"><span class="lbl">TOTAL factura:</span><span class="val">${fac.total != null ? money(fac.total) : '<span style="color:#dc3545;">no detectado</span>'}</span></div>`;
  // Validación cruzada: subtotal + IVA + percepciones debe dar total
  if (fac.neto != null && fac.total != null) {
    const calculado = fac.neto + sumaIva + totalPerc;
    const dif = Math.abs(fac.total - calculado);
    if (dif > 1) {
      h += `<div class="row" style="color:#dc3545; font-size:12px;"><span class="lbl">⚠ Diferencia neto+IVA+perc vs Total:</span><span class="val">${money(dif)}</span></div>`;
    } else {
      h += `<div class="row" style="color:#2ea043; font-size:12px;"><span class="lbl">✓ Neto + IVA + Percepciones = Total</span><span class="val"></span></div>`;
    }
  }
  h += `</div></div>`;

  // Panel de debug: siempre visible como <details> colapsado. Muestra el texto
  // crudo que pdfjs extrajo del PDF. Sirve para diagnosticar por qué algo no se
  // detecta sin necesidad de abrir la consola.
  const lineasCrudas = (window._debugFactura && window._debugFactura.lineas) || [];
  h += `<details style="margin-top:12px; background:#f7f5f2; border:1px solid #e5e0d8; border-radius:6px; padding:10px 14px;">
    <summary style="cursor:pointer; font-weight:600; font-size:13px; color:#666;">🔍 Ver texto crudo del PDF (${lineasCrudas.length} líneas) — para diagnosticar detecciones</summary>
    <div style="margin-top:10px; font-family:monospace; font-size:11px; background:#fff; padding:10px; border-radius:4px; max-height:400px; overflow:auto; white-space:pre-wrap;">${
      lineasCrudas.map((l, i) => `<div><span style="color:#999;">${String(i+1).padStart(3,' ')}:</span> ${esc(l)}</div>`).join('')
    }</div>
    <div style="margin-top:8px; font-size:11px; color:#666;">
      Copiá el bloque completo y pasámelo si algún campo no se detecta.
      <button class="btn secondary" style="padding:2px 10px; font-size:11px; margin-left:8px;" onclick="navigator.clipboard.writeText(JSON.stringify(window._debugFactura.lineas, null, 2))">Copiar</button>
    </div>
  </details>`;

  const faltantes = percLineas.filter(p => p.faltaCrear);
  if (faltantes.length) {
    h += `<div class="alerta err"><b>Faltan crear ${faltantes.length} impuesto(s) en Odoo:</b><br>`;
    faltantes.forEach(p => {
      const fc = p.faltaCrear;
      h += `· <b>Percepción IIBB ${fc.jurisdiccion} – ${fc.res?'RG '+fc.res:fc.alcance}</b> (de "${p.concepto}" = ${money(p.monto)}). No tenés ningún impuesto de esa provincia en tu sistema.<br>`;
    });
    h += `Creala en Odoo y volvé a procesar.</div>`;
  }
  if (grupos['_SIN_MAPEO']) {
    h += `<div class="alerta">Hay percepciones que no se reconocieron. Revisalas antes de confirmar.</div>`;
  }

  window._gruposActuales = gruposArr.filter(g=>!g.sinMapeo);
  window._facActual = fac;
  // Ahora se puede aplicar aunque no haya percepciones (solo neto + IVA).
  const puedeConfirmar = !!fac.cuitProv && !!fac.comprobante && !grupos['_SIN_MAPEO'] && !faltantes.length;
  const btnTxt = percLineas.length
    ? 'Buscar borrador en Odoo y aplicar'
    : 'Buscar borrador en Odoo y aplicar solo neto + IVA';

  h += `<div class="actions-row">
    <button class="btn secondary" id="btnOtra">Cargar otra</button>
    <button class="btn primary" id="btnConfirmar" ${puedeConfirmar?'':'disabled'}>${btnTxt}</button>
  </div><div id="resultadoOdoo"></div>`;

  $('preview').innerHTML = h;
  $('btnOtra').addEventListener('click', () => location.reload());
  if (puedeConfirmar) $('btnConfirmar').addEventListener('click', confirmarEnOdoo);
}

async function confirmarEnOdoo() {
  const btn = $('btnConfirmar'); btn.disabled = true;
  const fac = window._facActual, grupos = window._gruposActuales;
  const out = $('resultadoOdoo');
  const headers = {
    'Content-Type': 'application/json',
    apikey: SB_KEY(),
    Authorization: 'Bearer ' + SB_KEY(),
  };
  try {
    out.innerHTML = `<div class="status-bar"><span class="dot load"></span>Buscando borrador en Odoo…</div>`;
    let r = await fetch(FN_URL(), {
      method: 'POST', headers,
      body: JSON.stringify({ modo: 'buscar_borrador', cuit: fac.cuitProv.replace(/\D/g,'') }),
    });
    let d = await r.json();
    if (!d.ok) throw new Error(d.error);

    const normComp = (s) => (s||'').replace(/[^\d-]/g,'').split('-').map(x=>parseInt(x,10)||0).join('-');
    const match = (d.borradores||[]).find(b => normComp(b.l10n_latam_document_number) === normComp(fac.comprobante));
    if (!match) {
      out.innerHTML = `<div class="alerta">No se encontró borrador con CUIT ${fac.cuitProv} y comprobante ${fac.comprobante}.</div>`;
      btn.disabled = false; return;
    }

    // Leer líneas del borrador para decidir si hay que distribuir
    out.innerHTML = `<div class="status-bar"><span class="dot load"></span>Leyendo líneas del borrador…</div>`;
    r = await fetch(FN_URL(), {
      method: 'POST', headers,
      body: JSON.stringify({ modo: 'leer_borrador', move_id: match.id }),
    });
    d = await r.json();
    if (!d.ok) throw new Error(d.error);

    window._borradorMatch = match;
    if ((d.lineas_gasto || []).length > 1) {
      // Multi-línea: mostrar panel de distribución
      mostrarPanelDistribucion(match, d.lineas_gasto);
      btn.disabled = false;
      return;
    }
    // 1 línea: aplicar directo
    await aplicarAOdoo(match.id, null);
  } catch (e) {
    out.innerHTML = `<div class="alerta err">Error: ${e.message}</div>`;
    btn.disabled = false;
  }
}

function mostrarPanelDistribucion(match, lineas) {
  const fac = window._facActual;
  const out = $('resultadoOdoo');
  window._borradorLineas = lineas;
  const neto = Math.round((fac.neto || 0) * 100) / 100;

  // Distribución inicial: proporcional al price_unit actual del borrador
  const totalActual = lineas.reduce((s,l)=>s + Number(l.price_unit || 0), 0);
  const initial = totalActual > 0
    ? lineas.map(l => Math.round((neto * Number(l.price_unit) / totalActual) * 100) / 100)
    : lineas.map(() => Math.round((neto / lineas.length) * 100) / 100);
  // Ajustar último para que sume exacto
  const acumInicial = initial.slice(0, -1).reduce((a,b)=>a+b, 0);
  initial[initial.length - 1] = Math.round((neto - acumInicial) * 100) / 100;

  let h = `<div class="invoice" style="margin-top:14px; border-color: var(--muted);">
    <div class="inv-head">
      <div class="full">📊 Distribuir subtotal en ${lineas.length} líneas del borrador ${match.name}</div>
      <div><span class="k">Subtotal PDF:</span> <span class="v">${money(neto)}</span></div>
      <div><span class="k">IVA (a todas):</span> <span class="v">${money((fac.ivas||[]).reduce((s,v)=>s+v.monto,0))}</span></div>
      <div><span class="k">Percepciones (a la 1ª):</span> <span class="v">${money((window._gruposActuales||[]).reduce((s,g)=>s+g.monto,0))}</span></div>

      <button class="btn secondary" style="font-size:12px; padding: 6px 10px;" onclick="distrProporcional()">Proporcional al borrador</button>`;
  lineas.forEach((l, i) => {
    h += `<button class="btn secondary" style="font-size:12px; padding: 6px 10px;" onclick="distrTodoA(${i})">Todo a "${esc((l.producto || l.nombre || '').slice(0,25))}"</button>`;
  });
  h += `</div>
    <table>
      <thead><tr><th>Línea del borrador</th><th>Cuenta</th><th class="num">Actual</th><th class="num">Asignar</th></tr></thead>
      <tbody>`;
  lineas.forEach((l, i) => {
    h += `<tr>
      <td>${esc(l.producto || l.nombre || '(sin descripción)')}</td>
      <td style="font-size:11px; color:var(--muted);">${esc(l.cuenta || '')}</td>
      <td class="num" style="color:var(--muted);">${money(l.price_unit)}</td>
      <td class="num">
        <input type="number" step="0.01" min="0" class="dist-input" data-idx="${i}" value="${initial[i].toFixed(2)}" style="width: 130px; text-align: right; padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-variant-numeric: tabular-nums;">
      </td>
    </tr>`;
  });
  h += `</tbody></table>
    <div class="totales" style="margin-top: 8px;">
      <div class="row"><span class="lbl">Suma asignada:</span><span class="val" id="distSum">${money(neto)}</span></div>
      <div class="row"><span class="lbl">Objetivo (subtotal PDF):</span><span class="val">${money(neto)}</span></div>
      <div class="row" id="distDiff" style="font-size:12px;"></div>

    <div class="actions-row" style="margin-top: 10px;">
      <button class="btn secondary" onclick="cancelarDistribucion()">Cancelar</button>
      <button class="btn primary" id="btnAplicarDist" disabled>Aplicar distribución a Odoo</button>
    </div>
  </div>`;
  out.innerHTML = h;

  // Wire inputs: change = commit (autocompletar la última al resto); input = validar en vivo
  document.querySelectorAll('.dist-input').forEach(inp => {
    inp.addEventListener('input', validarDistribucion);
    inp.addEventListener('change', () => autocompletarResto(Number(inp.dataset.idx)));
  });
  $('btnAplicarDist').addEventListener('click', async () => {
    const dist = obtenerDistribucion();
    await aplicarAOdoo(window._borradorMatch.id, dist);
  });
  validarDistribucion();
}

function obtenerDistribucion() {
  const inputs = document.querySelectorAll('.dist-input');
  const lineas = window._borradorLineas;
  return Array.from(inputs).map((inp, i) => ({
    line_id: lineas[i].id,
    price_unit: Number(inp.value) || 0,
  }));
}

function validarDistribucion() {
  const fac = window._facActual;
  const neto = Math.round((fac.neto || 0) * 100) / 100;
  const dist = obtenerDistribucion();
  const suma = Math.round(dist.reduce((s,d)=>s + d.price_unit, 0) * 100) / 100;
  $('distSum').textContent = money(suma);
  const dif = Math.round((suma - neto) * 100) / 100;
  const diffEl = $('distDiff');
  const btn = $('btnAplicarDist');
  if (Math.abs(dif) < 0.01) {
    diffEl.innerHTML = `<span class="lbl" style="color:#2ea043;">✓ Suma coincide con el subtotal</span><span class="val"></span>`;
    btn.disabled = false;
  } else if (dif > 0) {
    diffEl.innerHTML = `<span class="lbl" style="color:#dc3545;">⚠ Sobra:</span><span class="val" style="color:#dc3545;">${money(dif)}</span>`;
    btn.disabled = true;
  } else {
    diffEl.innerHTML = `<span class="lbl" style="color:#dc3545;">⚠ Falta:</span><span class="val" style="color:#dc3545;">${money(Math.abs(dif))}</span>`;
    btn.disabled = true;
  }
}

function distrEquitativa() {
  const fac = window._facActual;
  const inputs = document.querySelectorAll('.dist-input');
  const neto = Math.round((fac.neto || 0) * 100) / 100;
  const parte = Math.floor((neto / inputs.length) * 100) / 100;
  inputs.forEach((inp, i) => {
    inp.value = (i === inputs.length - 1
      ? (neto - parte * (inputs.length - 1))
      : parte).toFixed(2);
  });
  validarDistribucion();
}

function distrProporcional() {
  const fac = window._facActual;
  const inputs = document.querySelectorAll('.dist-input');
  const lineas = window._borradorLineas;
  const neto = Math.round((fac.neto || 0) * 100) / 100;
  const total = lineas.reduce((s,l)=>s + Number(l.price_unit || 0), 0);
  if (total <= 0) return distrEquitativa();
  let acum = 0;
  inputs.forEach((inp, i) => {
    const v = i === inputs.length - 1
      ? Math.round((neto - acum) * 100) / 100
      : Math.round((neto * Number(lineas[i].price_unit) / total) * 100) / 100;
    acum += v;
    inp.value = v.toFixed(2);
  });
  validarDistribucion();
}

// Al editar una línea (no la última), completar la última con el resto del subtotal.
function autocompletarResto(idxEditado) {
  const fac = window._facActual;
  const neto = Math.round((fac.neto || 0) * 100) / 100;
  const inputs = document.querySelectorAll('.dist-input');
  const lastIdx = inputs.length - 1;
  if (idxEditado === lastIdx) return; // editó la última: no autocompletar
  let suma = 0;
  inputs.forEach((inp, i) => { if (i !== lastIdx) suma += Number(inp.value) || 0; });
  const resto = Math.round((neto - suma) * 100) / 100;
  inputs[lastIdx].value = Math.max(0, resto).toFixed(2);
  validarDistribucion();
}

function distrTodoA(idx) {
  const fac = window._facActual;
  const inputs = document.querySelectorAll('.dist-input');
  const neto = Math.round((fac.neto || 0) * 100) / 100;
  inputs.forEach((inp, i) => inp.value = (i === idx ? neto : 0).toFixed(2));
  validarDistribucion();
}

function cancelarDistribucion() {
  $('resultadoOdoo').innerHTML = '';
  $('btnConfirmar').disabled = false;
}

async function aplicarAOdoo(moveId, lineasDistribucion) {
  const fac = window._facActual, grupos = window._gruposActuales;
  const out = $('resultadoOdoo');
  const headers = {
    'Content-Type': 'application/json',
    apikey: SB_KEY(),
    Authorization: 'Bearer ' + SB_KEY(),
  };
  out.innerHTML = `<div class="status-bar"><span class="dot load"></span>Aplicando a Odoo…</div>`;
  const percepciones = grupos.map(g => ({
    tax_id: g.tax_id, monto: Math.round(g.monto*100)/100,
  }));
  let iva_tax_id = null;
  if ((fac.ivas || []).length && ivasOdoo.length) {
    const ivaPrincipal = [...fac.ivas].sort((a,b)=>b.alicuota-a.alicuota)[0];
    const found = ivasOdoo.find(t => Math.abs(t.amount - ivaPrincipal.alicuota) < 0.01);
    if (found) iva_tax_id = found.id;
  }
  const payload = { modo: 'aplicar_percepciones', move_id: moveId, percepciones };
  if (iva_tax_id) payload.iva_tax_id = iva_tax_id;
  if (lineasDistribucion) {
    payload.lineas_distribucion = lineasDistribucion;
  } else if (fac.neto != null && fac.neto > 0) {
    payload.neto = Math.round(fac.neto*100)/100;
  }
  const r = await fetch(FN_URL(), { method: 'POST', headers, body: JSON.stringify(payload) });
  const d = await r.json();
  if (!d.ok) throw new Error(d.error);

  const match = window._borradorMatch || { name: 'borrador' };
  let hh = `<div class="invoice" style="margin-top:14px;">
    <div class="inv-head">
      <div class="full">✓ Aplicado a ${match.name} ${d.modo === 'multi_linea' ? '(distribución multi-línea)' : ''}</div>
      <div><span class="k">Total Odoo:</span> <span class="v">${money(d.cabecera.amount_total)}</span></div>
      <div><span class="k">Percepciones aplicadas:</span> <span class="v">${d.aplicadas}</span></div>
    </div>
    <div class="totales">`;
  (d.lineas_tax || []).forEach(l => {
    hh += `<div class="row perc"><span class="lbl">${l.name}:</span><span class="val">${money(l.balance)}</span></div>`;
  });
  hh += `</div></div>
    <div class="alerta ok">Listo. Revisá la factura en Odoo y confirmala a mano. El borrador NO fue posteado.</div>`;
  out.innerHTML = hh;
}
window.distrEquitativa = distrEquitativa;
window.distrProporcional = distrProporcional;
window.distrTodoA = distrTodoA;
window.cancelarDistribucion = cancelarDistribucion;
</script>
</body>
</html>
