<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semi-elaborados · Rosaint CORE</title>
  <meta name="app-root" content="../">
  <link rel="icon" type="image/svg+xml" href="../shell/logo.svg">
  <link rel="stylesheet" href="../shell/shell.css">
  <style>
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .toolbar .search { flex: 1; min-width: 220px; }
    .toolbar .search input { width: 100%; }
    .count-info { font-size: 12.5px; color: var(--muted); }

    .tbl { width: 100%; border-collapse: collapse; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; font-size: 13px; }
    .tbl th {
      text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); padding: 10px 12px; background: var(--surface-2);
      border-bottom: 1px solid var(--border); font-weight: 600;
    }
    .tbl td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl td.num, .tbl th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .tbl td.codigo { font-family: var(--font-mono); color: var(--accent); font-size: 12px; }
    .tbl tr:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); }

    .row-actions { display: flex; gap: 4px; }
    .btn-icon {
      background: none; border: 1px solid transparent; padding: 4px 8px;
      border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--muted);
      transition: color .12s, border-color .12s, background .12s; text-decoration: none;
    }
    .btn-icon:hover { color: var(--text); background: var(--surface-2); border-color: var(--border); }
    .btn-icon.accent { color: var(--accent); }
    .btn-icon.accent:hover { color: var(--accent); border-color: var(--accent); }

    .empty-box {
      padding: 40px 20px; text-align: center; color: var(--muted);
      background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius);
    }

    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-bg.show { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      max-width: 560px; width: 100%; padding: 24px 26px;
    }
    .modal-box h3 { font-size: 18px; margin-bottom: 4px; }
    .modal-box .sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .modal-box label {
      display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); font-weight: 600; margin-bottom: 4px;
    }
    .modal-box input, .modal-box select, .modal-box textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
      font: inherit; margin-bottom: 12px;
    }
    .modal-box textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    .modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-tint);
    }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
    .field-grid .full { grid-column: 1 / -1; }
    .field-help { font-size: 12px; color: var(--muted); margin-top: -8px; margin-bottom: 10px; }
    .field-error { font-size: 12px; color: var(--hot); margin-top: -8px; margin-bottom: 10px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; align-items: center; }
    .modal-actions .spacer { flex: 1; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg); padding: 12px 22px;
      border-radius: var(--radius-sm); font-size: 14px; opacity: 0; pointer-events: none;
      transition: all .25s; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--hot); color: var(--on-accent); }
    .toast.ok { background: var(--ok); color: var(--on-accent); }
  </style>
</head>
<body data-page="laboratorio" data-title="Semi-elaborados" data-subtitle="Granel intermedio · fórmulas reutilizables">

<div id="app-shell"></div>

<main id="app-content">

  <div class="toolbar">
    <div class="search">
      <input type="text" class="input" id="search" placeholder="Buscar por nombre o código…">
    </div>
    <span class="count-info" id="cnt">—</span>
    <button class="btn primary" id="btnNuevo">+ Nuevo semi-elaborado</button>
  </div>

  <div id="content"><div class="empty-box">Cargando…</div></div>

</main>

<div class="modal-bg" id="modalItem">
  <div class="modal-box">
    <h3 id="mi-title">Nuevo semi-elaborado</h3>
    <div class="sub">Código en el rango 90300-90399 para SE.</div>
    <div class="field-grid">
      <div>
        <label>Código *</label>
        <input type="text" id="mi-codigo" maxlength="5">
        <p class="field-help" id="mi-cod-help"></p>
        <p class="field-error" id="mi-cod-err" style="display:none;"></p>
      </div>
      <div>
        <label>Estado</label>
        <select id="mi-estado">
          <option value="vigente">vigente</option>
          <option value="desarrollo">desarrollo</option>
          <option value="descontinuado">descontinuado</option>
        </select>
      </div>
      <div class="full">
        <label>Nombre *</label>
        <input type="text" id="mi-nombre" maxlength="200">
      </div>
      <div class="full">
        <label>Función principal</label>
        <input type="text" id="mi-func">
      </div>
      <div class="full">
        <label>Notas</label>
        <textarea id="mi-notas" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="miBtnDel" style="color:var(--hot); display:none;">Eliminar</button>
      <span class="spacer"></span>
      <button class="btn ghost" id="miBtnCancel">Cancelar</button>
      <button class="btn primary" id="miBtnSave">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase.js"></script>
<script src="../shell/shell.js"></script>
<script>
// Semi-elaborados — items tipo=SE. Costo se calcula desde la fórmula (RPC calcular_costo_formula).
let ITEMS = [], COSTOS = {};
let editando = null;

const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtARS = n => n == null ? '—' : '$' + Math.round(n).toLocaleString('es-AR');

async function cargar() {
  try {
    const { data, error } = await sb.from('items').select('*').eq('tipo', 'SE');
    if (error) throw error;
    ITEMS = (data || []).sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));

    // Costos en paralelo (RPC escalar por SE)
    const resultados = await Promise.all(ITEMS.map(async (i) => {
      try {
        const { data: c } = await sb.rpc('calcular_costo_formula', { p_codigo_granel: i.codigo });
        return [i.codigo, c != null ? Number(c) : null];
      } catch (e) { return [i.codigo, null]; }
    }));
    COSTOS = {};
    for (const [cod, val] of resultados) COSTOS[cod] = val;

    render();
  } catch (err) {
    $('#content').innerHTML = `<div class="empty-box" style="color:var(--hot);">Error: ${esc(err.message)}</div>`;
  }
}

function render() {
  const q = $('#search').value.trim().toLowerCase();
  let rows = ITEMS;
  if (q) rows = rows.filter(i => (i.nombre + ' ' + i.codigo).toLowerCase().includes(q));

  $('#cnt').textContent = rows.length + ' semi-elaborado' + (rows.length !== 1 ? 's' : '');

  if (!rows.length) {
    $('#content').innerHTML = `<div class="empty-box">${ITEMS.length ? 'Sin coincidencias' : 'No hay semi-elaborados. Creá uno con "+ Nuevo semi-elaborado".'}</div>`;
    return;
  }

  $('#content').innerHTML = `
    <table class="tbl">
      <thead><tr>
        <th>Código</th><th>Nombre</th><th class="num">Costo/Kg (calculado)</th>
        <th style="width:120px;">Acciones</th>
      </tr></thead>
      <tbody>
        ${rows.map(i => `
          <tr>
            <td class="codigo">${esc(i.codigo)}</td>
            <td>${esc(i.nombre)}${i.estado !== 'vigente' ? ` <span style="font-size:10px; color:var(--warn); text-transform:uppercase; margin-left:6px;">${esc(i.estado)}</span>` : ''}</td>
            <td class="num" style="font-weight:600;">${fmtARS(COSTOS[i.codigo])}</td>
            <td>
              <div class="row-actions">
                <a class="btn-icon accent" href="formulas.html?codigo=${esc(i.codigo)}" title="Abrir editor de fórmula">⚗</a>
                <button class="btn-icon" onclick="abrirEditar('${esc(i.codigo)}')" title="Editar item">✎</button>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function siguienteCodigo() {
  const usados = new Set(ITEMS.map(i => parseInt(i.codigo, 10)).filter(n => n >= 90300 && n <= 90399));
  for (let n = 90301; n <= 90399; n++) if (!usados.has(n)) return String(n);
  return '';
}

function abrirNuevo() {
  editando = null;
  $('#mi-title').textContent = 'Nuevo semi-elaborado';
  const sugerido = siguienteCodigo();
  $('#mi-codigo').value = sugerido; $('#mi-codigo').readOnly = false;
  $('#mi-cod-help').textContent = `Sugerido: ${sugerido}.`;
  $('#mi-cod-err').style.display = 'none';
  ['#mi-nombre','#mi-func','#mi-notas'].forEach(s => $(s).value = '');
  $('#mi-estado').value = 'vigente';
  $('#miBtnDel').style.display = 'none';
  $('#modalItem').classList.add('show');
  setTimeout(() => $('#mi-nombre').focus(), 60);
}

function abrirEditar(codigo) {
  const i = ITEMS.find(x => x.codigo === codigo); if (!i) return;
  editando = codigo;
  $('#mi-title').textContent = 'Editar semi-elaborado';
  $('#mi-codigo').value = i.codigo; $('#mi-codigo').readOnly = true;
  $('#mi-cod-help').textContent = 'El código no se puede cambiar desde este módulo.';
  $('#mi-cod-err').style.display = 'none';
  $('#mi-nombre').value = i.nombre || '';
  $('#mi-estado').value = i.estado || 'vigente';
  $('#mi-func').value = i.funcion_principal || '';
  $('#mi-notas').value = i.notas || '';
  $('#miBtnDel').style.display = '';
  $('#modalItem').classList.add('show');
  setTimeout(() => $('#mi-nombre').focus(), 60);
}

function cerrarItem() { $('#modalItem').classList.remove('show'); }

async function guardarItem() {
  const codigo = $('#mi-codigo').value.trim();
  const nombre = $('#mi-nombre').value.trim();
  const errBox = $('#mi-cod-err'); errBox.style.display = 'none';
  if (!nombre) { toast('El nombre es obligatorio', 'err'); return; }
  if (!editando) {
    if (!/^\d{5}$/.test(codigo)) { errBox.textContent = 'El código debe ser de 5 dígitos numéricos'; errBox.style.display = 'block'; return; }
    if (ITEMS.some(i => i.codigo === codigo)) { errBox.textContent = 'Este código ya está en uso'; errBox.style.display = 'block'; return; }
  }
  const data = {
    codigo, nombre, tipo: 'SE',
    estado: $('#mi-estado').value,
    unidad: 'Kg',
    funcion_principal: $('#mi-func').value.trim() || null,
    notas: $('#mi-notas').value.trim() || null,
  };
  const btn = $('#miBtnSave'); btn.disabled = true;
  try {
    if (editando) { delete data.codigo; const { error } = await sb.from('items').update(data).eq('codigo', editando); if (error) throw error; }
    else { const { error } = await sb.from('items').insert(data); if (error) throw error; }
    cerrarItem(); await cargar();
    toast(editando ? 'SE actualizado' : 'SE creado (cargá su fórmula desde el editor ⚗)', 'ok');
  } catch (err) { toast('Error: ' + err.message, 'err'); }
  finally { btn.disabled = false; }
}

async function eliminarItem() {
  if (!editando) return;
  if (!confirm('¿Eliminar este semi-elaborado? Si está usado en otra fórmula, la operación fallará.')) return;
  const btn = $('#miBtnDel'); btn.disabled = true;
  try {
    // Borrar fórmulas y componentes asociados
    const { data: formulas } = await sb.from('formulas').select('id').eq('codigo_granel', editando);
    const fIds = (formulas || []).map(f => f.id);
    if (fIds.length) {
      await sb.from('formula_componentes').delete().in('formula_id', fIds);
      await sb.from('formulas').delete().in('id', fIds);
    }
    const { error } = await sb.from('items').delete().eq('codigo', editando); if (error) throw error;
    cerrarItem(); await cargar(); toast('SE eliminado', 'ok');
  } catch (err) { toast('No se pudo eliminar: ' + err.message, 'err'); }
  finally { btn.disabled = false; }
}

let toastT;
function toast(msg, kind) {
  const t = $('#toast'); t.textContent = msg;
  t.className = 'toast show ' + (kind || '');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

$('#btnNuevo').addEventListener('click', abrirNuevo);
$('#search').addEventListener('input', render);
$('#miBtnSave').addEventListener('click', guardarItem);
$('#miBtnDel').addEventListener('click', eliminarItem);
$('#miBtnCancel').addEventListener('click', cerrarItem);
$('#modalItem').addEventListener('click', e => { if (e.target.id === 'modalItem') cerrarItem(); });

window.abrirEditar = abrirEditar;
cargar();
</script>
</body>
</html>
