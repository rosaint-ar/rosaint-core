<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combos · Rosaint CORE</title>
  <meta name="app-root" content="../">
  <link rel="icon" type="image/svg+xml" href="../shell/logo.svg">
  <link rel="stylesheet" href="../shell/shell.css">
  <style>
    .toolbar {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .toolbar .search {
      flex: 1; min-width: 220px;
    }
    .toolbar .search input { width: 100%; }
    .count-info { font-size: 12.5px; color: var(--muted); }

    .combo-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0; margin-bottom: 10px;
      overflow: hidden;
    }
    .combo-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--surface-2);
      border-bottom: 1px solid var(--border); gap: 12px;
    }
    .combo-header .name { font-weight: 600; color: var(--text); }
    .combo-header .meta {
      font-size: 12px; color: var(--muted); margin-left: 8px;
    }
    .combo-header .meta .code { font-family: var(--font-mono); color: var(--accent); }
    .combo-header .right { display: flex; gap: 10px; align-items: center; }
    .cost-pill {
      font-size: 12px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }

    .combo-body {
      padding: 12px 16px; font-size: 13px;
    }
    .combo-comps {
      color: var(--text); margin-bottom: 8px;
    }
    .combo-comps .none { color: var(--muted); font-style: italic; }
    .plat-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .plat-chip {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      background: var(--accent-tint); color: var(--accent); font-weight: 500;
    }
    .plat-chips .none { font-size: 11px; color: var(--muted); font-style: italic; }

    /* ---- Modal ---- */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-bg.show { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); max-width: 640px; width: 100%;
      max-height: 90vh; overflow-y: auto; padding: 24px 26px;
    }
    .modal-box h3 { font-size: 18px; margin-bottom: 4px; }
    .modal-box .sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .modal-box label {
      display: block; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); font-weight: 600;
      margin-bottom: 4px;
    }
    .modal-box input[type=text], .modal-box input[type=number], .modal-box select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text); font: inherit;
      margin-bottom: 12px;
    }
    .modal-box input:focus, .modal-box select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-tint);
    }
    .field-help { font-size: 12px; color: var(--muted); margin-top: -8px; margin-bottom: 12px; }
    .field-error { font-size: 12px; color: var(--hot); margin-top: -8px; margin-bottom: 12px; }

    .comp-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
    }
    .comp-row input[type=text] { flex: 1; margin: 0; }
    .comp-row input[type=number] { width: 70px; margin: 0; }

    .cost-box {
      padding: 10px 14px; background: var(--surface-2);
      border-radius: var(--radius-sm); font-size: 13px; margin-top: 6px;
      color: var(--muted);
    }
    .cost-box b { color: var(--text); font-variant-numeric: tabular-nums; }

    .canales-row {
      display: flex; gap: 18px; flex-wrap: wrap; margin: 8px 0 14px;
    }
    .canales-row label {
      display: flex; align-items: center; gap: 6px;
      text-transform: none; letter-spacing: normal; font-weight: 500;
      color: var(--text); font-size: 13px; margin-bottom: 0;
    }
    .canales-row label.disabled { color: var(--muted); cursor: not-allowed; }

    .modal-actions {
      display: flex; gap: 10px; margin-top: 20px; align-items: center;
    }
    .modal-actions .spacer { flex: 1; }
    .btn-delete { color: var(--hot); border-color: color-mix(in srgb, var(--hot) 30%, transparent); }
    .btn-delete:hover { border-color: var(--hot); background: color-mix(in srgb, var(--hot) 8%, transparent); }

    .empty-box {
      padding: 40px 20px; text-align: center; color: var(--muted);
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg);
      padding: 12px 22px; border-radius: var(--radius-sm);
      font-size: 14px; opacity: 0; pointer-events: none;
      transition: all .25s; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--hot); color: var(--on-accent); }
    .toast.ok { background: var(--ok); color: var(--on-accent); }
  </style>
</head>
<body data-page="catalogo" data-title="Combos" data-subtitle="Combos de 2 a 5 productos, con costo y publicación por canal">

<div id="app-shell"></div>

<main id="app-content">

  <div class="toolbar">
    <div class="search">
      <input type="text" class="input" id="search" placeholder="Buscar combo por nombre, código o SKU…">
    </div>
    <span class="count-info" id="cntInfo">—</span>
    <button class="btn primary" id="btnNuevo">+ Nuevo combo</button>
  </div>

  <div id="content">
    <div class="empty-box">Cargando…</div>
  </div>

</main>

<!-- Modal de edición -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Nuevo combo</h3>
    <div class="sub" id="modalCode">Se asignará el próximo código libre</div>

    <label>Nombre del combo</label>
    <input type="text" id="in-nombre" placeholder="Ej: Combo Criógeno 1Kg + Termogénico 1Kg">

    <label>SKU externo (opcional)</label>
    <input type="text" id="in-sku" placeholder="Ej: SKU para ML o Tienda Nube">
    <p class="field-help">Código con el que identificás el combo en plataformas externas.</p>

    <label>Cantidad de productos</label>
    <select id="in-cant">
      <option value="2">2 productos</option>
      <option value="3">3 productos</option>
      <option value="4">4 productos</option>
      <option value="5">5 productos</option>
    </select>

    <div id="comps"></div>

    <div class="cost-box">
      Costo del combo: <b id="cost">—</b>
      <span id="cost-det" style="color:var(--muted);"></span>
    </div>

    <label style="margin-top:16px;">Publicar en canales <span style="text-transform:none; letter-spacing:normal; font-weight:400; color:var(--muted); font-size:11px;">(Odoo incluye todo por defecto)</span></label>
    <div class="canales-row">
      <label><input type="checkbox" class="canal-check" data-canal="lista_profesional"> 📋 Lista profesional</label>
      <label><input type="checkbox" class="canal-check" data-canal="tienda_nube"> 🔵 Tienda Nube</label>
      <label class="disabled" title="Mercado Libre se gestiona por sincronización de publicaciones">
        <input type="checkbox" disabled> 🟡 Mercado Libre (por sincronización)
      </label>
    </div>

    <div class="modal-actions">
      <button class="btn secondary btn-delete" id="btnDel" style="display:none;">Eliminar combo</button>
      <span class="spacer"></span>
      <button class="btn ghost" id="btnCancel">Cancelar</button>
      <button class="btn primary" id="btnSave">Guardar combo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase.js"></script>
<script src="../shell/shell.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// Combos — CRUD
// items (tipo=COMBO, codigo 60000-69999) + pack_componentes + item_canales
// Costo desde v_costos_skus (una fila por SKU con su costo_total)
// ═══════════════════════════════════════════════════════════════════════════

const PLAT_LABEL = { lista_profesional: '📋 Lista', tienda_nube: '🔵 Tienda Nube', mercado_libre: '🟡 ML' };

let COMBOS = [];        // items tipo=COMBO
let SKUS_VENDIBLES = []; // items tipo=SKU (para componer combos)
let PACK_COMP = [];     // pack_componentes de todos los combos
let ITEM_CANALES = {};  // codigo → { canal: activo }
let COSTOS_SKU = {};    // codigo_sku → costo_total

let editando = null;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmtARS = n => n == null ? '—' : '$' + Math.round(n).toLocaleString('es-AR');
const esc = s => (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function cargar() {
  try {
    const [items, packs, canales, costos] = await Promise.all([
      sb.from('items').select('codigo, nombre, tipo, sku_externo, estado').in('tipo', ['COMBO', 'SKU']),
      sb.from('pack_componentes').select('codigo_pack, codigo_sku, cantidad'),
      sb.from('item_canales').select('codigo_item, canal, activo'),
      sb.from('v_costos_skus').select('codigo_sku, costo_unitario'),
    ]);
    if (items.error) throw items.error;
    if (packs.error) throw packs.error;
    if (canales.error) throw canales.error;

    const allItems = items.data || [];
    COMBOS = allItems.filter(i => i.tipo === 'COMBO' && i.estado === 'vigente')
                     .sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
    SKUS_VENDIBLES = allItems.filter(i => i.tipo === 'SKU' && i.estado === 'vigente')
                             .sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));

    PACK_COMP = packs.data || [];

    ITEM_CANALES = {};
    for (const c of (canales.data || [])) {
      if (!ITEM_CANALES[c.codigo_item]) ITEM_CANALES[c.codigo_item] = {};
      ITEM_CANALES[c.codigo_item][c.canal] = c.activo;
    }

    COSTOS_SKU = {};
    for (const c of (costos.data || [])) {
      COSTOS_SKU[c.codigo_sku] = c.costo_unitario != null ? Number(c.costo_unitario) : null;
    }

    render();
  } catch (err) {
    $('#content').innerHTML = `<div class="empty-box" style="color:var(--hot);">Error: ${esc(err.message)}</div>`;
  }
}

function costoDeCombo(codigo) {
  const comps = PACK_COMP.filter(pc => pc.codigo_pack === codigo);
  let total = 0;
  for (const pc of comps) {
    const c = COSTOS_SKU[pc.codigo_sku];
    if (c == null) return null;
    total += c * pc.cantidad;
  }
  return total;
}

function render() {
  const q = $('#search').value.trim().toLowerCase();
  let rows = COMBOS;
  if (q) rows = rows.filter(c => (c.codigo + ' ' + c.nombre + ' ' + (c.sku_externo||'')).toLowerCase().includes(q));

  $('#cntInfo').textContent = rows.length + ' combo' + (rows.length !== 1 ? 's' : '');

  const cont = $('#content');
  if (!rows.length) {
    cont.innerHTML = `<div class="empty-box">${COMBOS.length ? 'Sin coincidencias' : 'No hay combos todavía. Creá uno con "+ Nuevo combo".'}</div>`;
    return;
  }

  cont.innerHTML = rows.map(c => {
    const comps = PACK_COMP.filter(pc => pc.codigo_pack === c.codigo);
    const costo = costoDeCombo(c.codigo);
    const canales = ITEM_CANALES[c.codigo] || {};

    const compsHtml = comps.length
      ? comps.map(pc => {
          const sku = SKUS_VENDIBLES.find(s => s.codigo === pc.codigo_sku);
          const nom = sku ? sku.nombre : pc.codigo_sku;
          return `${pc.cantidad > 1 ? pc.cantidad + '× ' : ''}${esc(nom)}`;
        }).join(' + ')
      : '<span class="none">sin componentes</span>';

    const platsActivos = ['lista_profesional', 'tienda_nube'].filter(k => canales[k]);
    const platsHtml = platsActivos.length
      ? platsActivos.map(k => `<span class="plat-chip">${PLAT_LABEL[k]}</span>`).join('')
      : '<span class="none">sin canales activos</span>';

    return `
      <div class="combo-row">
        <div class="combo-header">
          <div>
            <span class="name">${esc(c.nombre)}</span>
            <span class="meta">· <span class="code">${c.codigo}</span>${c.sku_externo ? ' · SKU ' + esc(c.sku_externo) : ''}</span>
          </div>
          <div class="right">
            <span class="cost-pill">costo ${fmtARS(costo)}</span>
            <button class="btn secondary" style="padding:5px 12px; font-size:12.5px;" onclick="abrirEditar('${c.codigo}')">Editar</button>
          </div>
        </div>
        <div class="combo-body">
          <div class="combo-comps">${compsHtml}</div>
          <div class="plat-chips">${platsHtml}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── Modal ───
function siguienteCodigo() {
  const usados = new Set(COMBOS.map(c => parseInt(c.codigo, 10)).filter(n => n >= 60000 && n <= 69999));
  let n = 60001;
  while (usados.has(n)) n++;
  return String(n);
}

function textoDeSku(codigo) {
  const s = SKUS_VENDIBLES.find(x => x.codigo === codigo);
  if (!s) return '';
  const costo = COSTOS_SKU[codigo];
  return `${s.nombre} (${s.codigo})${costo != null ? ' · ' + fmtARS(costo) : ''}`;
}
function codigoDeInput(texto) {
  if (!texto) return '';
  const matches = [...texto.matchAll(/\(([^)]+)\)/g)];
  if (matches.length) return matches[matches.length - 1][1].trim();
  return texto.trim();
}

function renderComps(cantidad, valores) {
  const cont = $('#comps');
  const dlOpts = SKUS_VENDIBLES.map(s => {
    const c = COSTOS_SKU[s.codigo];
    return `<option value="${esc(s.nombre)} (${s.codigo})${c != null ? ' · ' + fmtARS(c) : ''}"></option>`;
  }).join('');
  let html = `<datalist id="sku-list">${dlOpts}</datalist>`;
  for (let i = 0; i < cantidad; i++) {
    const v = valores && valores[i] ? valores[i] : { codigo_sku: '', cantidad: 1 };
    html += `
      <div class="comp-row">
        <input type="text" class="comp-sku" list="sku-list" placeholder="Escribí nombre o código…" value="${esc(textoDeSku(v.codigo_sku))}">
        <input type="number" class="comp-cant" min="1" value="${v.cantidad || 1}" title="Cantidad">
      </div>`;
  }
  cont.innerHTML = html;
  cont.querySelectorAll('.comp-sku, .comp-cant').forEach(el => el.addEventListener('input', recalcularCosto));
  recalcularCosto();
}

function recalcularCosto() {
  const filas = $$('#comps .comp-row');
  let total = 0;
  const det = [];
  filas.forEach(f => {
    const sku = codigoDeInput(f.querySelector('.comp-sku').value);
    const cant = parseInt(f.querySelector('.comp-cant').value, 10) || 1;
    if (!sku) return;
    const c = COSTOS_SKU[sku];
    if (c != null) { total += c * cant; det.push(`${cant}×${fmtARS(c)}`); }
  });
  $('#cost').textContent = total > 0 ? fmtARS(total) : '—';
  $('#cost-det').textContent = det.length ? ` (${det.join(' + ')})` : '';
}

function abrirNuevo() {
  editando = null;
  $('#modalTitle').textContent = 'Nuevo combo';
  $('#modalCode').textContent = `Se asignará el código ${siguienteCodigo()}`;
  $('#in-nombre').value = '';
  $('#in-sku').value = '';
  $('#in-cant').value = '2';
  $('#btnDel').style.display = 'none';
  $$('.canal-check').forEach(c => c.checked = false);
  renderComps(2, null);
  $('#modal').classList.add('show');
}

function abrirEditar(codigo) {
  const c = COMBOS.find(x => x.codigo === codigo);
  if (!c) return;
  editando = codigo;
  $('#modalTitle').textContent = 'Editar combo';
  $('#modalCode').textContent = `Código ${codigo}`;
  $('#in-nombre').value = c.nombre;
  $('#in-sku').value = c.sku_externo || '';
  $('#btnDel').style.display = '';

  const comps = PACK_COMP.filter(pc => pc.codigo_pack === codigo).map(pc => ({
    codigo_sku: pc.codigo_sku, cantidad: pc.cantidad,
  }));
  const cant = Math.max(2, comps.length);
  $('#in-cant').value = String(Math.min(cant, 5));
  renderComps(cant, comps);

  const canales = ITEM_CANALES[codigo] || {};
  $$('.canal-check').forEach(chk => { chk.checked = !!canales[chk.dataset.canal]; });

  $('#modal').classList.add('show');
}

function cerrarModal() { $('#modal').classList.remove('show'); }

$('#in-cant').addEventListener('change', () => {
  const n = parseInt($('#in-cant').value, 10);
  // Preservar valores existentes
  const existentes = [];
  $$('#comps .comp-row').forEach(f => {
    existentes.push({
      codigo_sku: codigoDeInput(f.querySelector('.comp-sku').value),
      cantidad: parseInt(f.querySelector('.comp-cant').value, 10) || 1,
    });
  });
  renderComps(n, existentes);
});

async function guardar() {
  const nombre = $('#in-nombre').value.trim();
  if (!nombre) { toast('Poné un nombre al combo.', 'err'); return; }
  const skuExterno = $('#in-sku').value.trim() || null;

  const comps = [];
  const invalidos = [];
  $$('#comps .comp-row').forEach(f => {
    const texto = f.querySelector('.comp-sku').value;
    const sku = codigoDeInput(texto);
    const cant = parseInt(f.querySelector('.comp-cant').value, 10) || 1;
    if (!sku) return;
    if (!SKUS_VENDIBLES.some(s => s.codigo === sku)) { invalidos.push(texto); return; }
    comps.push({ codigo_sku: sku, cantidad: cant });
  });

  if (invalidos.length) { toast('SKU no reconocido: ' + invalidos.join(', '), 'err'); return; }
  if (comps.length < 2) { toast('Un combo necesita al menos 2 productos válidos.', 'err'); return; }

  const canalesMarcados = { odoo: true };
  $$('.canal-check').forEach(c => { canalesMarcados[c.dataset.canal] = c.checked; });

  const codigo = editando || siguienteCodigo();
  const btn = $('#btnSave'); btn.disabled = true;

  try {
    if (editando) {
      const { error } = await sb.from('items').update({
        nombre, sku_externo: skuExterno, actualizado_en: new Date().toISOString(),
      }).eq('codigo', codigo);
      if (error) throw new Error('Item: ' + error.message);
    } else {
      const { error } = await sb.from('items').insert({
        codigo, nombre, sku_externo: skuExterno, tipo: 'COMBO', estado: 'vigente',
      });
      if (error) throw new Error('Item: ' + error.message);
    }

    await sb.from('pack_componentes').delete().eq('codigo_pack', codigo);
    const { error: eComp } = await sb.from('pack_componentes').insert(
      comps.map(c => ({ codigo_pack: codigo, codigo_sku: c.codigo_sku, cantidad: c.cantidad }))
    );
    if (eComp) throw new Error('Componentes: ' + eComp.message);

    for (const [canal, activo] of Object.entries(canalesMarcados)) {
      const { error: eC } = await sb.from('item_canales').upsert({
        codigo_item: codigo, canal, activo, actualizado_en: new Date().toISOString(),
      }, { onConflict: 'codigo_item,canal' });
      if (eC) throw new Error('Canal ' + canal + ': ' + eC.message);
    }

    cerrarModal();
    await cargar();
    toast(editando ? 'Combo actualizado' : `Combo ${codigo} creado`, 'ok');
  } catch (e) {
    toast(e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

async function eliminar() {
  if (!editando) return;
  if (!confirm('¿Eliminar este combo? Se borran sus componentes y canales. No se puede deshacer.')) return;
  const codigo = editando;
  const btn = $('#btnDel'); btn.disabled = true;
  try {
    await sb.from('combo_plataformas').delete().eq('codigo_combo', codigo);
    await sb.from('pack_componentes').delete().eq('codigo_pack', codigo);
    await sb.from('item_canales').delete().eq('codigo_item', codigo);
    const { error } = await sb.from('items').delete().eq('codigo', codigo);
    if (error) throw error;
    cerrarModal();
    await cargar();
    toast('Combo eliminado', 'ok');
  } catch (e) {
    toast('No se pudo eliminar: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

$('#btnNuevo').addEventListener('click', abrirNuevo);
$('#btnSave').addEventListener('click', guardar);
$('#btnDel').addEventListener('click', eliminar);
$('#btnCancel').addEventListener('click', cerrarModal);
$('#modal').addEventListener('click', e => { if (e.target.id === 'modal') cerrarModal(); });
$('#search').addEventListener('input', render);

let toastT;
function toast(msg, kind) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind || '');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2400);
}

// Global (para onclick inline)
window.abrirEditar = abrirEditar;

cargar();
</script>
</body>
</html>
