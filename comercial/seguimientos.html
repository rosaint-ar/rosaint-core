<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimientos · Rosaint CORE</title>
  <meta name="app-root" content="../">
  <link rel="stylesheet" href="../shell/shell.css">
  <style>
    /* ---- Resumen ---- */
    .seg-resumen { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    .seg-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; min-width: 150px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .seg-chip .n { font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
    .seg-chip .l { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
    .seg-chip.avisar { border-left: 4px solid var(--accent); }
    .seg-chip.avisar .n { color: var(--accent); }
    .seg-chip.despachar { border-left: 4px solid var(--warn); }
    .seg-chip.despachar .n { color: var(--warn); }

    /* ---- Controles ---- */
    .seg-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .seg-tabs { display: flex; gap: 4px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 4px; }
    .seg-tab {
      padding: 8px 14px; border-radius: var(--radius-sm); border: none; background: none;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); transition: background .12s, color .12s;
    }
    .seg-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .seg-tab .cnt { font-variant-numeric: tabular-nums; opacity: .7; }
    .seg-spacer { flex: 1; }
    select.seg-sel { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 13px; }

    /* ---- Plantilla ---- */
    details.tpl-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
    details.tpl-box > summary { list-style: none; cursor: pointer; padding: 12px 16px; font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    details.tpl-box > summary::-webkit-details-marker { display: none; }
    details.tpl-box > summary::before { content: '▸'; color: var(--muted); font-size: 10px; transition: transform .15s; }
    details.tpl-box[open] > summary::before { transform: rotate(90deg); }
    .tpl-body { padding: 4px 16px 16px; display: grid; gap: 14px; }
    .tpl-field label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; }
    .tpl-field textarea { width: 100%; min-height: 120px; resize: vertical; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text); font: inherit; font-size: 13px; line-height: 1.5; }
    .tpl-vars { font-size: 11.5px; color: var(--muted); }
    .tpl-vars code { background: var(--surface-2); padding: 1px 5px; border-radius: 4px; font-family: var(--font-mono); }
    .tpl-actions { display: flex; gap: 8px; }

    /* ---- Card de pedido ---- */
    .seg-list { display: grid; gap: 14px; }
    .seg-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; }
    .seg-card.avisado { opacity: .58; }
    .seg-head { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; flex-wrap: wrap; }
    .seg-head .who { flex: 1; min-width: 180px; }
    .seg-head .who .name { font-size: 15px; font-weight: 700; }
    .seg-head .who .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .seg-head .badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .b-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .b-num { background: var(--surface-2); color: var(--muted); font-family: var(--font-mono); }
    .b-carrier { background: color-mix(in srgb, var(--structure) 14%, transparent); color: var(--structure); }
    .b-camino { background: color-mix(in srgb, var(--ok) 15%, transparent); color: var(--ok); }
    .b-pend { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }

    .seg-prods { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 3px; }
    .seg-prods .p { font-size: 13px; display: flex; gap: 8px; }
    .seg-prods .p .q { color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .seg-prods .p .sku { color: var(--accent); font-family: var(--font-mono); font-size: 11px; }

    .seg-track { padding: 0 16px 12px; font-size: 12.5px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .seg-track .code { font-family: var(--font-mono); background: var(--surface-2); padding: 2px 8px; border-radius: 6px; }
    .seg-track a { color: var(--accent); font-weight: 600; }

    .seg-msg { border-top: 1px solid var(--border); background: var(--surface-2); padding: 12px 16px; }
    .seg-msg textarea { width: 100%; min-height: 118px; resize: vertical; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font: inherit; font-size: 13px; line-height: 1.5; }
    .seg-msg-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .btn-wa { background: #25D366; color: #fff; font-weight: 600; }
    .btn-wa:hover { background: #1eb958; }
    .btn-wa[disabled] { background: var(--muted); cursor: not-allowed; }
    .seg-done { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; font-size: 12.5px; color: var(--muted); cursor: pointer; user-select: none; }
    .seg-done input { width: 15px; height: 15px; accent-color: var(--accent); }

    .seg-empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .seg-loading { text-align: center; padding: 48px 20px; color: var(--muted); }
    .seg-error { background: color-mix(in srgb, var(--hot) 8%, transparent); border: 1px solid color-mix(in srgb, var(--hot) 30%, transparent); color: var(--hot); padding: 14px 16px; border-radius: var(--radius); font-size: 13px; }
  </style>
</head>
<body data-page="seguimientos" data-title="Seguimientos" data-subtitle="Avisá el envío a tus clientes de Tienda Nube">

<div id="app-shell"></div>

<main id="app-content">

  <div class="seg-resumen" id="resumen">
    <div class="seg-chip avisar"><span class="n" id="r-avisar">—</span><span class="l">Para avisar</span></div>
    <div class="seg-chip despachar"><span class="n" id="r-despachar">—</span><span class="l">Por despachar</span></div>
    <div class="seg-chip"><span class="n" id="r-total">—</span><span class="l">Ventas con envío</span></div>
  </div>

  <details class="tpl-box">
    <summary>⚙ Plantillas de mensaje</summary>
    <div class="tpl-body">
      <div class="tpl-field">
        <label>Pedido despachado (con tracking)</label>
        <textarea id="tpl-despachado"></textarea>
      </div>
      <div class="tpl-field">
        <label>Pedido por despachar (aún sin salir)</label>
        <textarea id="tpl-pendiente"></textarea>
      </div>
      <div class="tpl-vars">
        Variables: <code>{nombre}</code> <code>{numero}</code> <code>{transportista}</code>
        <code>{tracking}</code> <code>{link}</code> <code>{productos}</code> <code>{ciudad}</code> <code>{provincia}</code>
      </div>
      <div class="tpl-actions">
        <button class="btn primary" onclick="guardarPlantillas()">Guardar</button>
        <button class="btn secondary" onclick="restaurarPlantillas()">Restaurar por defecto</button>
      </div>
    </div>
  </details>

  <div class="seg-controls">
    <div class="seg-tabs">
      <button class="seg-tab active" data-tab="avisar" onclick="setTab('avisar')">Para avisar <span class="cnt" id="t-avisar"></span></button>
      <button class="seg-tab" data-tab="despachar" onclick="setTab('despachar')">Por despachar <span class="cnt" id="t-despachar"></span></button>
      <button class="seg-tab" data-tab="todos" onclick="setTab('todos')">Todos</button>
    </div>
    <div class="seg-spacer"></div>
    <label style="font-size:12px;color:var(--muted)">Últimos
      <select class="seg-sel" id="dias" onchange="cargar()">
        <option value="15">15 días</option>
        <option value="30" selected>30 días</option>
        <option value="60">60 días</option>
        <option value="90">90 días</option>
      </select>
    </label>
    <button class="btn secondary" onclick="cargar()">↻ Refrescar</button>
  </div>

  <div id="salida"><div class="seg-loading">Cargando ventas de Tienda Nube…</div></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase.js"></script>
<script src="../shell/shell.js"></script>
<script>
// ---- Plantillas por defecto ----
const TPL_DEF = {
  despachado:
`¡Hola {nombre}! 👋 Te escribimos de Rosaint 🌿

Tu pedido #{numero} ya está en camino 📦
Lo despachamos por {transportista}.

Seguí tu envío acá:
🔗 {link}
📇 N° de seguimiento: {tracking}

Cualquier cosa quedamos a disposición. ¡Gracias por elegirnos! 💛`,
  pendiente:
`¡Hola {nombre}! 👋 Te escribimos de Rosaint 🌿

¡Recibimos tu pedido #{numero}! Ya lo estamos preparando para despacharlo.
En cuanto salga te enviamos el código de seguimiento por acá.

¡Gracias por tu compra! 💛`
};
const LS_TPL = 'seg-plantillas';
const LS_AVISADOS = 'seg-avisados';

function getPlantillas() {
  try { return Object.assign({}, TPL_DEF, JSON.parse(localStorage.getItem(LS_TPL) || '{}')); }
  catch { return { ...TPL_DEF }; }
}
function getAvisados() {
  try { return new Set(JSON.parse(localStorage.getItem(LS_AVISADOS) || '[]')); }
  catch { return new Set(); }
}
function setAvisado(id, on) {
  const s = getAvisados();
  if (on) s.add(String(id)); else s.delete(String(id));
  localStorage.setItem(LS_AVISADOS, JSON.stringify([...s]));
}

// ---- Utils ----
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function fmtFecha(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('es-AR',{day:'numeric',month:'short'}); }
function fmtMoney(n){ const x=Number(n); if(isNaN(x)) return ''; return '$'+x.toLocaleString('es-AR',{maximumFractionDigits:0}); }
function limpiarProd(nombre){ return String(nombre||'').replace(/\s*\d+\s*(g|gr|kg|cc|ml|lts?|l)\b.*$/i, m=>m).trim(); }

function listaProductos(prods){
  return (prods||[]).map(p => p.cantidad>1 ? `${p.cantidad}x ${p.nombre}` : p.nombre).join(', ');
}

function aplicarPlantilla(tpl, o){
  const prods = listaProductos(o.productos);
  return tpl
    .replace(/\{nombre\}/g, o.primer_nombre || o.cliente || '')
    .replace(/\{numero\}/g, o.numero || '')
    .replace(/\{transportista\}/g, o.transportista || 'el correo')
    .replace(/\{tracking\}/g, o.tracking_code || '—')
    .replace(/\{link\}/g, o.tracking_url || '')
    .replace(/\{productos\}/g, prods)
    .replace(/\{ciudad\}/g, o.ciudad || '')
    .replace(/\{provincia\}/g, o.provincia || '');
}

// ---- Estado ----
let DATA = [];
let TAB = 'avisar';

function setTab(t){
  TAB = t;
  document.querySelectorAll('.seg-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  render();
}

async function cargar(){
  const salida = document.getElementById('salida');
  salida.innerHTML = '<div class="seg-loading">Cargando ventas de Tienda Nube…</div>';
  const dias = document.getElementById('dias').value;
  try {
    const { data: sess } = await sb.auth.getSession();
    const token = sess && sess.session && sess.session.access_token;
    const r = await fetch(window.SUPABASE_URL + '/functions/v1/tn-seguimientos?dias=' + dias, {
      headers: { apikey: window.SUPABASE_KEY, Authorization: 'Bearer ' + token }
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'Error al leer Tienda Nube');
    DATA = j.ordenes || [];
    document.getElementById('r-avisar').textContent    = j.resumen.para_avisar;
    document.getElementById('r-despachar').textContent = j.resumen.por_despachar;
    document.getElementById('r-total').textContent     = j.resumen.total;
    document.getElementById('t-avisar').textContent    = '(' + j.resumen.para_avisar + ')';
    document.getElementById('t-despachar').textContent = '(' + j.resumen.por_despachar + ')';
    render();
  } catch (e) {
    salida.innerHTML = '<div class="seg-error">No pude cargar los pedidos: ' + esc(e.message) + '</div>';
  }
}

function filtrar(){
  if (TAB === 'avisar')    return DATA.filter(o => o.necesita_seguimiento);
  if (TAB === 'despachar') return DATA.filter(o => !o.despachado);
  return DATA;
}

function render(){
  const salida = document.getElementById('salida');
  const tpls = getPlantillas();
  const avisados = getAvisados();
  const lista = filtrar();

  if (!lista.length) {
    const msg = TAB === 'avisar' ? '✓ No hay pedidos despachados pendientes de avisar.'
      : TAB === 'despachar' ? '✓ No hay pedidos por despachar.'
      : 'No hay ventas con envío en el período.';
    salida.innerHTML = '<div class="seg-empty">' + msg + '</div>';
    return;
  }

  // Avisados al final
  lista.sort((a,b) => (avisados.has(String(a.id))?1:0) - (avisados.has(String(b.id))?1:0));

  let html = '<div class="seg-list">';
  for (const o of lista) {
    const yaAvisado = avisados.has(String(o.id));
    const enCamino = o.necesita_seguimiento;
    const tpl = enCamino ? tpls.despachado : tpls.pendiente;
    const msg = aplicarPlantilla(tpl, o);
    const waHref = o.telefono_wa ? ('https://wa.me/' + o.telefono_wa + '?text=' + encodeURIComponent(msg)) : '';

    const prodHtml = (o.productos||[]).map(p =>
      `<div class="p"><span class="q">${p.cantidad}×</span><span>${esc(p.nombre)}</span>${p.sku?`<span class="sku">${esc(p.sku)}</span>`:''}</div>`
    ).join('');

    const estadoBadge = enCamino
      ? '<span class="b-tag b-camino">📦 En camino</span>'
      : '<span class="b-tag b-pend">⏳ Por despachar</span>';

    const trackHtml = o.tracking_code
      ? `<div class="seg-track"><span>Seguimiento:</span><span class="code">${esc(o.tracking_code)}</span>${o.tracking_url?`<a href="${esc(o.tracking_url)}" target="_blank" rel="noopener">Ver en ${esc(o.transportista)} →</a>`:''}</div>`
      : '';

    html += `<div class="seg-card${yaAvisado?' avisado':''}" data-id="${o.id}">
      <div class="seg-head">
        <div class="who">
          <div class="name">${esc(o.cliente)}</div>
          <div class="meta">${esc([o.ciudad,o.provincia].filter(Boolean).join(', '))} · ${fmtFecha(o.fecha)} · ${esc(fmtMoney(o.total))}</div>
        </div>
        <div class="badges">
          ${estadoBadge}
          <span class="b-tag b-carrier">${esc(o.transportista)}</span>
          <span class="b-tag b-num">#${esc(o.numero)}</span>
        </div>
      </div>
      <div class="seg-prods">${prodHtml}</div>
      ${trackHtml}
      <div class="seg-msg">
        <textarea id="msg-${o.id}">${esc(msg)}</textarea>
        <div class="seg-msg-actions">
          <a class="btn btn-wa" ${waHref?`href="${esc(waHref)}" target="_blank" rel="noopener"`:'disabled'} onclick="marcarEnvio(${o.id})">WhatsApp</a>
          <button class="btn secondary" onclick="copiarMsg(${o.id})">Copiar mensaje</button>
          ${!o.telefono_wa?'<span style="font-size:12px;color:var(--warn);align-self:center">Sin teléfono</span>':''}
          <label class="seg-done"><input type="checkbox" ${yaAvisado?'checked':''} onchange="toggleAvisado(${o.id}, this.checked)"> Avisado</label>
        </div>
      </div>
    </div>`;
  }
  html += '</div>';
  salida.innerHTML = html;
}

function copiarMsg(id){
  const ta = document.getElementById('msg-' + id);
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = event.target; const t = btn.textContent; btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = t, 1400);
  });
}
// El link de WhatsApp usa el texto de la plantilla al renderizar; si el usuario
// editó el textarea, actualizamos el href al vuelo antes de abrir.
function marcarEnvio(id){
  const ta = document.getElementById('msg-' + id);
  const a = document.querySelector('.seg-card[data-id="'+id+'"] .btn-wa');
  if (ta && a && a.href) {
    const base = a.href.split('?text=')[0];
    a.href = base + '?text=' + encodeURIComponent(ta.value);
  }
}
function toggleAvisado(id, on){
  setAvisado(id, on);
  const card = document.querySelector('.seg-card[data-id="'+id+'"]');
  if (card) card.classList.toggle('avisado', on);
}

// ---- Plantillas UI ----
function pintarPlantillas(){
  const t = getPlantillas();
  document.getElementById('tpl-despachado').value = t.despachado;
  document.getElementById('tpl-pendiente').value = t.pendiente;
}
function guardarPlantillas(){
  const t = {
    despachado: document.getElementById('tpl-despachado').value,
    pendiente: document.getElementById('tpl-pendiente').value,
  };
  localStorage.setItem(LS_TPL, JSON.stringify(t));
  render();
  const b = event.target; const txt = b.textContent; b.textContent = '✓ Guardado';
  setTimeout(() => b.textContent = txt, 1400);
}
function restaurarPlantillas(){
  localStorage.removeItem(LS_TPL);
  pintarPlantillas();
  render();
}

pintarPlantillas();
cargar();
</script>
</body>
</html>
