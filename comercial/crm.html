<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM · Rosaint CORE</title>
  <meta name="app-root" content="../">
  <link rel="icon" type="image/svg+xml" href="../shell/logo.svg">
  <link rel="stylesheet" href="../shell/shell.css">
  <style>
    /* ---- Colores por segmento (semánticos: usan tokens del shell) ---- */
    :root {
      --t-react:  var(--hot);        /* a reactivar: rojo */
      --t-enfri:  var(--warn);       /* enfriándose: ámbar */
      --t-dorm:   var(--structure);  /* dormido: azul institucional */
      --t-nunca:  var(--muted);      /* nunca compró: gris */
      --t-activo: var(--ok);         /* activo: verde */
    }

    /* ---- Barra de tabs + acciones ---- */
    .tabs-bar {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .tabs { display: flex; gap: 0; }
    .tab {
      padding: 10px 16px; font-size: 13.5px; font-weight: 500;
      color: var(--muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color .12s, border-color .12s;
      display: flex; align-items: center; gap: 6px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }
    .tab .cnt {
      font-size: 11px; color: var(--muted);
      background: var(--surface-2);
      padding: 1px 7px; border-radius: 10px; font-weight: 500;
    }
    .tab.active .cnt { background: var(--accent-tint); color: var(--accent); }
    .tabs-actions {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 8px;
    }
    .sync-info { font-size: 11px; color: var(--muted); }
    #btnSync svg { transition: transform .3s; }
    #btnSync.spin svg { animation: rot 1s linear infinite; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════════════════════════
       MODO COLA (queue) — un cliente por vez, el más prioritario
       ══════════════════════════════════════════════════════════════════ */
    .queue-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 18px; padding-top: 10px;
    }
    .queue-head { text-align: center; }
    .queue-head .big { font-size: 14px; color: var(--muted); }
    .queue-head .big b { color: var(--accent); font-size: 16px; font-weight: 700; }

    .qcard {
      width: 100%; max-width: 620px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; position: relative;
    }
    .qcard .stripe { height: 6px; background: var(--c); }
    .qcard-body { padding: 24px 26px; }
    .qcard .qtop {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 20px;
    }
    .qcard .qname {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em; line-height: 1.15;
    }
    .qcard .qbadge {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; white-space: nowrap;
      color: var(--c);
      background: color-mix(in srgb, var(--c) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 32%, transparent);
    }
    .qmetrics {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      padding: 16px 0; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border); margin-bottom: 18px;
    }
    .qm { text-align: center; }
    .qm .v { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
    .qm .v.hot { color: var(--c); }
    .qm .k {
      font-size: 10px; color: var(--muted); margin-top: 2px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .qprod { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .qprod b { color: var(--text); }
    .qprod .none { color: var(--muted); font-style: italic; }
    .qchips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

    .qbtns { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .qbtns-row { display: flex; gap: 10px; }
    .big-wa {
      flex: 1; display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; background: var(--accent); color: var(--on-accent);
      font-weight: 700; font-size: 14px; padding: 14px;
      border-radius: var(--radius); transition: background .12s;
    }
    .big-wa:hover { background: var(--accent-press); }
    .big-mark {
      width: 100%; padding: 12px;
      background: color-mix(in srgb, var(--ok) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--ok) 32%, transparent);
      border-radius: var(--radius); color: var(--ok);
      font-size: 13.5px; font-weight: 600; transition: background .12s;
    }
    .big-mark:hover { background: color-mix(in srgb, var(--ok) 20%, transparent); }
    .big-chat, .big-skip, .big-arch {
      padding: 12px 16px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted); font-size: 13px; font-weight: 500;
      transition: border-color .12s, color .12s;
    }
    .big-chat:hover { border-color: #25d366; color: #25d366; }
    .big-skip:hover { border-color: var(--muted); color: var(--text); }
    .big-arch:hover { border-color: var(--hot); color: var(--hot); }

    .queue-done { text-align: center; padding: 60px 20px; color: var(--muted); }
    .queue-done .big { font-size: 40px; margin-bottom: 14px; }
    .queue-done h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

    /* ══════════════════════════════════════════════════════════════════
       MODO LISTA
       ══════════════════════════════════════════════════════════════════ */
    .kpis {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    .kpi-seg {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .12s, border-color .12s;
    }
    .kpi-seg::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--c);
    }
    .kpi-seg:hover { transform: translateY(-1px); border-color: var(--muted); }
    .kpi-seg.active {
      border-color: var(--c);
      box-shadow: 0 0 0 1px var(--c);
    }
    .kpi-seg .n {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    .kpi-seg .l {
      font-size: 11px; color: var(--muted); margin-top: 2px;
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    }

    .toolbar {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .search-box { flex: 1; min-width: 220px; position: relative; }
    .search-box input {
      width: 100%; padding: 10px 12px 10px 38px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
    }
    .search-box input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-tint);
    }
    .search-box svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
    }
    select.picker {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      color: var(--text); font-size: 14px;
    }
    select.picker:focus { outline: none; border-color: var(--accent); }
    .count { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .list { display: flex; flex-direction: column; gap: 10px; }

    /* ---- Cada fila ---- */
    .row {
      position: relative; display: grid;
      grid-template-columns: 1fr auto; gap: 16px; align-items: flex-start;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px 16px 20px;
      transition: border-color .12s;
    }
    .row::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; border-radius: var(--radius) 0 0 var(--radius);
      background: var(--c);
    }
    .row {
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--c) 5%, var(--surface)) 0%,
        var(--surface) 220px);
    }
    .row:hover { border-color: var(--muted); }
    .row.contactado { opacity: .5; filter: saturate(.4); }
    .row.contactado::before { background: var(--border) !important; }
    .row.contactado { background: var(--surface) !important; }
    .row.contactado:hover { opacity: .75; }
    .row.contactado::after {
      content: '✓ contactado'; position: absolute; top: 12px; right: 16px;
      font-size: 11px; color: var(--muted); font-weight: 600;
    }

    .main { min-width: 0; }
    .row-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .name {
      font-size: 15px; font-weight: 650; letter-spacing: -0.01em;
      color: var(--text);
    }
    .row-badge {
      font-size: 11px; font-weight: 600; padding: 2px 9px;
      border-radius: 20px; white-space: nowrap; color: var(--c);
      background: color-mix(in srgb, var(--c) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 32%, transparent);
    }
    .metrics {
      display: flex; gap: 22px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .m .v {
      font-size: 14px; font-weight: 600; color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .m .v.hot { color: var(--c); }
    .m .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .prod { font-size: 12.5px; color: var(--muted); }
    .prod b { color: var(--text); font-weight: 600; }
    .prod .none { color: var(--muted); font-style: italic; }

    /* Mini indicador de ritmo/pulso */
    .pulse { margin-top: 10px; display: flex; align-items: center; gap: 9px; }
    .pulse-track {
      position: relative; flex: 1; max-width: 180px; height: 6px;
      border-radius: 4px;
      background: linear-gradient(90deg,
        var(--t-activo) 0%, var(--t-enfri) 50%, var(--t-react) 100%);
      opacity: .3;
    }
    .pulse-dot {
      position: absolute; top: 50%; width: 10px; height: 10px;
      border-radius: 50%; background: var(--c);
      border: 2px solid var(--surface);
      transform: translate(-50%,-50%);
      box-shadow: 0 0 0 1px var(--c);
    }
    .pulse-lbl { font-size: 10.5px; color: var(--muted); white-space: nowrap; }

    .chips { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .chip {
      font-size: 11.5px; color: var(--muted);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px;
      transition: color .12s, border-color .12s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .chip:hover { border-color: var(--muted); color: var(--text); }
    .chip svg { width: 13px; height: 13px; opacity: .7; }
    .chip.arch:hover { border-color: var(--hot); color: var(--hot); }
    .chip.mark:hover { border-color: var(--ok); color: var(--ok); }

    .right {
      display: flex; flex-direction: column; align-items: stretch;
      gap: 8px; flex-shrink: 0; min-width: 150px;
    }
    .wa {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; background: var(--accent); color: var(--on-accent);
      font-weight: 600; font-size: 13px; padding: 9px 16px;
      border-radius: var(--radius-sm); white-space: nowrap;
      transition: background .12s;
    }
    .wa:hover { background: var(--accent-press); }
    .chat-btn, .mark-btn {
      width: 100%; padding: 8px 14px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--muted); font-size: 12.5px; font-weight: 500;
      white-space: nowrap; transition: border-color .12s, color .12s;
    }
    .chat-btn:hover { border-color: #25d366; color: #25d366; }
    .mark-btn:hover { border-color: var(--ok); color: var(--ok); }
    .mark-btn.done {
      background: color-mix(in srgb, var(--ok) 12%, transparent);
      border-color: color-mix(in srgb, var(--ok) 32%, transparent);
      color: var(--ok);
    }
    .mark-btn.done:hover { background: transparent; }
    .telmuted { font-size: 11px; color: var(--muted); text-align: center; }

    .expand {
      margin-top: 10px; padding: 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); display: none;
    }
    .expand.show { display: block; }
    .expand h4 {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 8px; font-weight: 600;
    }
    .ptable { display: flex; flex-direction: column; gap: 6px; }
    .pitem {
      display: flex; justify-content: space-between; gap: 12px;
      font-size: 13px; padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .pitem:last-child { border-bottom: none; }
    .pitem .pn {
      color: var(--text); min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .pitem .pv {
      color: var(--muted); white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .empty-view, .loading {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }

    /* ---- Modal WhatsApp ---- */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 50; padding: 20px;
    }
    .modal-bg.show { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); max-width: 480px; width: 100%;
      padding: 24px;
    }
    .modal h3 { font-size: 16px; margin-bottom: 4px; color: var(--text); }
    .modal .who { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .modal textarea {
      width: 100%; min-height: 130px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px;
      color: var(--text); font-family: inherit; font-size: 14px;
      line-height: 1.5; resize: vertical;
    }
    .modal textarea:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }

    /* ---- Confirmación flotante ---- */
    .confirm {
      position: fixed; left: 50%; bottom: 28px;
      transform: translateX(-50%) translateY(120px);
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 14px; padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      z-index: 60; box-shadow: 0 12px 40px rgba(0,0,0,.25);
      transition: transform .25s ease; max-width: 90vw;
    }
    .confirm.show { transform: translateX(-50%) translateY(0); }
    .confirm .txt { font-size: 13.5px; color: var(--muted); }
    .confirm .txt b { color: var(--text); }
    .confirm .yes {
      padding: 8px 14px; border-radius: var(--radius-sm);
      background: var(--accent); color: var(--on-accent);
      font-size: 13px; font-weight: 600;
    }
    .confirm .no {
      padding: 8px 14px; border-radius: var(--radius-sm);
      background: var(--surface-2); color: var(--muted);
      border: 1px solid var(--border); font-size: 13px; font-weight: 500;
    }

    @media (max-width: 680px) {
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .row { grid-template-columns: 1fr; gap: 12px; }
      .right {
        flex-direction: row; align-items: center;
        justify-content: space-between; width: 100%;
      }
      .qmetrics { grid-template-columns: repeat(2, 1fr); }
      .tabs-bar { flex-direction: column; align-items: stretch; }
      .tabs { overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body data-page="crm" data-title="CRM" data-subtitle="Reactivación de clientes">

<div id="app-shell"></div>

<main id="app-content">

  <div class="tabs-bar">
    <div class="tabs">
      <button class="tab active" data-tab="cola" onclick="setTab('cola')">▶ Cola de contacto<span class="cnt" id="tab-cola"></span></button>
      <button class="tab" data-tab="lista" onclick="setTab('lista')">Lista completa<span class="cnt" id="tab-lista"></span></button>
      <button class="tab" data-tab="contactados" onclick="setTab('contactados')">Contactados<span class="cnt" id="tab-cont"></span></button>
      <button class="tab" data-tab="archivados" onclick="setTab('archivados')">Archivados<span class="cnt" id="tab-arch"></span></button>
    </div>
    <div class="tabs-actions">
      <span class="sync-info" id="syncInfo">…</span>
      <button class="btn secondary" id="btnSync" onclick="doSync()" title="Actualizar datos desde Odoo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
        <span id="btnSyncTxt">Sincronizar</span>
      </button>
    </div>
  </div>

  <div id="view-cola"></div>

  <div id="view-lista" style="display:none">
    <div class="kpis" id="kpis"></div>
    <div class="toolbar">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" placeholder="Buscar por nombre…">
      </div>
      <select id="orden" class="picker">
        <option value="prioridad">Orden: prioridad (termómetro)</option>
        <option value="dias">Más días sin comprar</option>
        <option value="monto">Mayor monto histórico</option>
        <option value="reciente">Compra más reciente</option>
      </select>
      <select id="fwa" class="picker">
        <option value="todos">Todos</option>
        <option value="con">Con WhatsApp</option>
        <option value="sin">Sin WhatsApp</option>
      </select>
    </div>
    <div class="count" id="count"></div>
    <div id="list"></div>
  </div>

  <div id="view-contactados" style="display:none">
    <div class="count" id="count-cont"></div>
    <div id="list-cont"></div>
  </div>
  <div id="view-archivados" style="display:none">
    <div class="count" id="count-arch"></div>
    <div id="list-arch"></div>
  </div>

</main>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Mensaje de WhatsApp</h3>
    <div class="who" id="modalWho"></div>
    <textarea id="modalText"></textarea>
    <div class="modal-actions">
      <button class="btn primary" id="modalSend">Abrir WhatsApp</button>
      <button class="btn secondary" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="confirm" id="confirm">
  <span class="txt">¿Contactaste a <b id="confirmName"></b>?</span>
  <button class="yes" onclick="confirmYes()">Sí, marcar</button>
  <button class="no" onclick="confirmNo()">No</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase.js"></script>
<script src="../shell/shell.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// CRM · Reactivación
// Lee cliente_metricas / cliente_producto / cliente_estado desde Supabase.
// La sincronización dispara la RPC iniciar_sync_completo (varios minutos).
// ═══════════════════════════════════════════════════════════════════════════

const EMPRESA = 'Rosaint';
const ODOO_URL = 'https://rosaint.odoo.com';
const DIAS_CONTACTADO = 15; // se considera "contactado" si fue hace menos de N días

const SEG = {
  a_reactivar: { label: 'A reactivar',  c: 'var(--t-react)' },
  enfriandose: { label: 'Enfriándose',  c: 'var(--t-enfri)' },
  dormido:     { label: 'Dormido',      c: 'var(--t-dorm)' },
  nunca_compro:{ label: 'Nunca compró', c: 'var(--t-nunca)' },
  activo:      { label: 'Activo',       c: 'var(--t-activo)' },
};
const ORDEN_SEG = ['a_reactivar','enfriandose','dormido','nunca_compro','activo'];

let DATA = [], PRODS = {}, ESTADO = {}, tab = 'cola';
let filtro = { seg: null, q: '', orden: 'prioridad', fwa: 'todos' };
let queueIdx = 0, pendingContact = null;

const fmtMoney = n => '$' + Math.round(n||0).toLocaleString('es-AR');
const cleanProd = s => (s||'').replace(/^\[[^\]]*\]\s*/,'').replace(/[«»]/g,'').trim();
const esc = s => (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtFecha = d => { if(!d) return '—'; const [y,m,da] = d.split('-'); return `${da}/${m}/${y}`; };

async function api(path, opts) {
  const r = await fetch(window.SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      apikey: window.SUPABASE_KEY,
      Authorization: 'Bearer ' + window.SUPABASE_KEY,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates',
    },
    ...opts,
  });
  return r;
}
async function apiGet(path) { const r = await api(path); return r.json(); }

async function load() {
  try {
    const m = await apiGet('cliente_metricas?select=*&partner_id=neq.15&es_profesional=eq.true&limit=2000');
    DATA = m || [];
    const p = await apiGet('cliente_producto?select=partner_id,product_name,veces_comprado,monto_total,es_servicio&order=monto_total.desc&limit=20000');
    PRODS = {};
    (p || []).forEach(x => { if (x.es_servicio) return; (PRODS[x.partner_id] = PRODS[x.partner_id] || []).push(x); });
    const e = await apiGet('cliente_estado?select=*&limit=5000');
    ESTADO = {};
    (e || []).forEach(x => { ESTADO[x.partner_id] = x; });
    document.getElementById('syncInfo').textContent = DATA.length + ' clientes';
    renderAll();
  } catch(err) {
    document.getElementById('view-cola').innerHTML = '<div class="empty-view">No se pudieron cargar los datos.<br>' + err.message + '</div>';
  }
}

// ─── Helpers de estado ───
function estaContactado(pid) {
  const e = ESTADO[pid]; if (!e || !e.contactado_at) return false;
  const dias = (Date.now() - new Date(e.contactado_at).getTime()) / 86400000;
  return dias < DIAS_CONTACTADO;
}
function estaArchivado(pid) { const e = ESTADO[pid]; return e && e.archivado; }

async function setEstado(pid, campos) {
  ESTADO[pid] = { ...(ESTADO[pid] || { partner_id: pid }), ...campos, updated_at: new Date().toISOString() };
  const body = JSON.stringify({ partner_id: pid, ...ESTADO[pid] });
  await api('cliente_estado?on_conflict=partner_id', {
    method: 'POST',
    headers: {
      apikey: window.SUPABASE_KEY,
      Authorization: 'Bearer ' + window.SUPABASE_KEY,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates',
    },
    body,
  });
}
async function marcarContactado(pid)   { await setEstado(pid, { contactado_at: new Date().toISOString() }); renderAll(); }
async function desmarcarContactado(pid){ await setEstado(pid, { contactado_at: null }); renderAll(); }
async function archivar(pid)           { await setEstado(pid, { archivado: true,  archivado_at: new Date().toISOString() }); renderAll(); }
async function desarchivar(pid)        { await setEstado(pid, { archivado: false, archivado_at: null }); renderAll(); }

function priorityScore(d) {
  const base = { a_reactivar: 4000, enfriandose: 3000, dormido: 2000, nunca_compro: 500, activo: 0 }[d.segmento] || 0;
  const g = Math.min((d.total_gastado||0)/100000, 500);
  return base + g;
}
function topProd(pid) { const l = PRODS[pid] || []; return l.length ? cleanProd(l[0].product_name) : null; }
function cuantosTop(d) { const n = d.total_facturas || 0; if (n > 30) return 10; if (n >= 10) return 5; return 3; }
function pulseHtml(d) {
  const ritmo = d.intervalo_tipico_dias, dias = d.dias_desde_ultima;
  if (!ritmo || ritmo <= 0 || dias == null || (d.total_facturas || 0) < 2) return '';
  const ratio = dias / ritmo;
  let pos = Math.min(Math.max(ratio/2, 0), 1) * 100;
  let lbl;
  if (ratio < 1) lbl = 'compra al día';
  else if (ratio < 2) lbl = 'se está atrasando';
  else if (ratio < 4) lbl = ratio.toFixed(1) + '× su ritmo';
  else lbl = 'muy atrasado';
  return `<div class="pulse" title="Cada ~${Math.round(ritmo)} días suele comprar; hace ${dias} que no"><div class="pulse-track"><div class="pulse-dot" style="left:${pos}%"></div></div><span class="pulse-lbl">${lbl}</span></div>`;
}

function objetivos() {
  return DATA.filter(d => !estaArchivado(d.partner_id) && d.segmento !== 'activo' && d.telefono_wa);
}
function colaPendiente() {
  return objetivos().filter(d => !estaContactado(d.partner_id)).sort((a,b) => priorityScore(b) - priorityScore(a));
}

function setTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === t));
  ['cola','lista','contactados','archivados'].forEach(v => {
    document.getElementById('view-' + v).style.display = (v === t ? '' : 'none');
  });
  renderAll();
}

function renderAll() {
  document.getElementById('tab-cola').textContent  = colaPendiente().length;
  document.getElementById('tab-lista').textContent = DATA.filter(d => !estaArchivado(d.partner_id)).length;
  document.getElementById('tab-cont').textContent  = DATA.filter(d => estaContactado(d.partner_id) && !estaArchivado(d.partner_id)).length;
  document.getElementById('tab-arch').textContent  = DATA.filter(d => estaArchivado(d.partner_id)).length;
  if (tab === 'cola') renderCola();
  if (tab === 'lista') { renderKPIs(); renderLista(); }
  if (tab === 'contactados') renderContactados();
  if (tab === 'archivados') renderArchivados();
}

// ─── Cola ───
function renderCola() {
  const cola = colaPendiente();
  const cont = document.getElementById('view-cola');
  if (!cola.length) {
    cont.innerHTML = '<div class="queue-done"><div class="big">🎉</div><h2>¡Cola al día!</h2><div>No quedan clientes prioritarios sin contactar.<br>Volvé más tarde o revisá la lista completa.</div></div>';
    return;
  }
  if (queueIdx >= cola.length) queueIdx = 0;
  const d = cola[queueIdx];
  const seg = SEG[d.segmento]; const tp = topProd(d.partner_id); const dias = d.dias_desde_ultima;
  const pedidoUrl = (d.ultimo_pedido_id && d.ultimo_pedido_id > 0) ? `${ODOO_URL}/odoo/sales/${d.ultimo_pedido_id}` : null;
  const contactoUrl = `${ODOO_URL}/odoo/contacts/${d.partner_id}`;
  cont.innerHTML = `
    <div class="queue-wrap">
      <div class="queue-head"><div class="big">Quedan <b>${cola.length}</b> por contactar · mostrando el más prioritario</div></div>
      <div class="qcard">
        <div class="stripe" style="--c:${seg.c};background:var(--c)"></div>
        <div class="qcard-body" style="--c:${seg.c}">
          <div class="qtop"><div class="qname">${esc(d.nombre)}</div><span class="qbadge">${seg.label}</span></div>
          <div class="qmetrics">
            <div class="qm"><div class="v hot">${dias!=null?dias+' d':'—'}</div><div class="k">sin comprar</div></div>
            <div class="qm"><div class="v">${fmtMoney(d.total_gastado)}</div><div class="k">histórico</div></div>
            <div class="qm"><div class="v">${d.total_facturas||0}</div><div class="k">compras</div></div>
            <div class="qm"><div class="v">${d.intervalo_tipico_dias?Math.round(d.intervalo_tipico_dias)+' d':'—'}</div><div class="k">su ritmo</div></div>
          </div>
          <div class="qprod">${tp?`Suele comprar: <b>${esc(tp)}</b>`:'<span class="none">Sin productos registrados</span>'}</div>
          ${pulseHtml(d)}
          <div class="qchips">
            ${dias!=null?`<span class="chip" onclick="toggleBox('qult')">📅 Última compra: ${fmtFecha(d.ultima_compra)}</span>`:''}
            ${(PRODS[d.partner_id]||[]).length?`<span class="chip" onclick="toggleBox('qtop')">📊 Top productos</span>`:''}
            <a class="chip" href="${contactoUrl}" target="_blank">👤 Ver contacto</a>
          </div>
          <div class="expand" id="box-qult"><h4>Última compra</h4><div style="font-size:14px">El <b>${fmtFecha(d.ultima_compra)}</b>${dias!=null?` · hace ${dias} días`:''}<br>${pedidoUrl?`<a class="chip" style="margin-top:8px" href="${pedidoUrl}" target="_blank">Abrir pedido ${esc(d.ultimo_pedido_name||'')} →</a>`:`<a class="chip" style="margin-top:8px" href="${contactoUrl}" target="_blank">Ver en Odoo (facturación directa) →</a>`}</div></div>
          <div class="expand" id="box-qtop"><h4>Productos que más compra (top ${cuantosTop(d)})</h4><div class="ptable">${topProdRows(d)}</div></div>
          <div class="qbtns">
            <button class="big-wa" onclick='waAndConfirm(${d.partner_id})'>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.9-2-1-.3-.1-.5-.2-.6.1-.2.3-.7 1-.9 1.1-.2.2-.3.2-.6.1-1.5-.7-2.4-1.3-3.4-3-.3-.5.3-.4.7-1.4.1-.2 0-.4 0-.5 0-.2-.6-1.5-.9-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.7.7-1 1.7-1 2.8 0 1.7 1.2 3.3 1.4 3.5.2.2 2.4 3.7 5.9 5 .8.3 1.5.5 2 .7.8.2 1.6.2 2.2.1.7-.1 1.7-.7 2-1.4.2-.6.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/></svg>
              Enviar WhatsApp
            </button>
            <div class="qbtns-row">
              <button class="big-mark" style="flex:1" onclick="marcarContactado(${d.partner_id})">✓ Marcar como contactado</button>
              <button class="big-chat" onclick="verChat(${d.partner_id})" title="Abrir el chat para ver qué respondió, sin texto cargado">💬 Ver chat</button>
            </div>
            <div class="qbtns-row">
              <button class="big-skip" onclick="skipQueue()">Saltar →</button>
              <button class="big-arch" onclick="archivar(${d.partner_id})">🗄 Archivar</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}
function topProdRows(d) {
  const list = (PRODS[d.partner_id] || []).slice(0, cuantosTop(d));
  return list.length
    ? list.map(p => `<div class="pitem"><span class="pn">${esc(cleanProd(p.product_name))}</span><span class="pv">${p.veces_comprado}× · ${fmtMoney(p.monto_total)}</span></div>`).join('')
    : '<div style="color:var(--muted)">Sin productos</div>';
}
function toggleBox(id) { document.getElementById('box-' + id).classList.toggle('show'); }
function skipQueue() { queueIdx++; renderCola(); }

function verChat(pid) {
  const d = DATA.find(x => x.partner_id === pid); if (!d || !d.telefono_wa) return;
  window.open('https://wa.me/' + d.telefono_wa, '_blank');
}

function waAndConfirm(pid) {
  const d = DATA.find(x => x.partner_id === pid); if (!d) return;
  const txt = encodeURIComponent(buildMsg(d));
  window.open('https://wa.me/' + d.telefono_wa + '?text=' + txt, '_blank');
  pendingContact = pid;
  document.getElementById('confirmName').textContent = d.nombre;
  document.getElementById('confirm').classList.add('show');
}
function confirmYes() { if (pendingContact) { marcarContactado(pendingContact); } closeConfirm(); }
function confirmNo()  { closeConfirm(); }
function closeConfirm() { document.getElementById('confirm').classList.remove('show'); pendingContact = null; }

// ─── Lista ───
function renderKPIs() {
  const c = { a_reactivar: 0, enfriandose: 0, dormido: 0, nunca_compro: 0, activo: 0 };
  DATA.filter(d => !estaArchivado(d.partner_id)).forEach(d => { if (c[d.segmento] != null) c[d.segmento]++; });
  document.getElementById('kpis').innerHTML = ORDEN_SEG.map(s =>
    `<div class="kpi-seg ${filtro.seg===s?'active':''}" style="--c:${SEG[s].c}" onclick="toggleSeg('${s}')">
      <div class="n">${c[s]}</div><div class="l">${SEG[s].label}</div>
    </div>`).join('');
}
function toggleSeg(s) { filtro.seg = filtro.seg === s ? null : s; renderKPIs(); renderLista(); }
function renderLista() {
  let rows = DATA.filter(d => !estaArchivado(d.partner_id));
  if (filtro.seg) rows = rows.filter(d => d.segmento === filtro.seg);
  if (filtro.q) { const q = filtro.q.toLowerCase(); rows = rows.filter(d => (d.nombre||'').toLowerCase().includes(q)); }
  if (filtro.fwa === 'con') rows = rows.filter(d => d.telefono_wa);
  if (filtro.fwa === 'sin') rows = rows.filter(d => !d.telefono_wa);
  rows.sort((a,b) => {
    const ca = estaContactado(a.partner_id) ? 1 : 0, cb = estaContactado(b.partner_id) ? 1 : 0;
    if (ca !== cb) return ca - cb;
    if (filtro.orden === 'dias') return (b.dias_desde_ultima||-1) - (a.dias_desde_ultima||-1);
    if (filtro.orden === 'monto') return (b.total_gastado||0) - (a.total_gastado||0);
    if (filtro.orden === 'reciente') return new Date(b.ultima_compra||0) - new Date(a.ultima_compra||0);
    return priorityScore(b) - priorityScore(a);
  });
  document.getElementById('count').textContent = rows.length + ' cliente' + (rows.length !== 1 ? 's' : '');
  document.getElementById('list').innerHTML = '<div class="list">' + rows.map(d => rowHtml(d)).join('') + '</div>';
}
function rowHtml(d) {
  const seg = SEG[d.segmento] || { label: d.segmento, c: 'var(--muted)' };
  const tp = topProd(d.partner_id); const dias = d.dias_desde_ultima;
  const hot = (d.segmento === 'a_reactivar' || d.segmento === 'dormido' || d.segmento === 'enfriandose');
  const tieneCompras = (d.total_facturas || 0) > 0;
  const cont = estaContactado(d.partner_id);
  const pedidoUrl = (d.ultimo_pedido_id && d.ultimo_pedido_id > 0) ? `${ODOO_URL}/odoo/sales/${d.ultimo_pedido_id}` : null;
  const contactoUrl = `${ODOO_URL}/odoo/contacts/${d.partner_id}`;
  const arch = estaArchivado(d.partner_id);
  return `<div class="row ${cont?'contactado':''}" style="--c:${seg.c}">
    <div class="main">
      <div class="row-top"><span class="name">${esc(d.nombre||'Sin nombre')}</span><span class="row-badge">${seg.label}</span></div>
      <div class="metrics">
        <div class="m"><div class="v ${hot?'hot':''}">${dias==null?'—':dias+' d'}</div><div class="k">sin comprar</div></div>
        <div class="m"><div class="v">${fmtMoney(d.total_gastado)}</div><div class="k">histórico</div></div>
        <div class="m"><div class="v">${d.total_facturas||0}</div><div class="k">compras</div></div>
        <div class="m"><div class="v">${d.intervalo_tipico_dias?Math.round(d.intervalo_tipico_dias)+' d':'—'}</div><div class="k">su ritmo</div></div>
      </div>
      <div class="prod">${tp?`Suele comprar: <b>${esc(tp)}</b>`:'<span class="none">Sin productos registrados</span>'}</div>
      ${pulseHtml(d)}
      <div class="chips">
        ${tieneCompras?`<span class="chip" onclick="toggleBox('ult-${d.partner_id}')">📅 Última compra</span>`:''}
        ${(PRODS[d.partner_id]||[]).length?`<span class="chip" onclick="toggleTopList(${d.partner_id})">📊 Top productos</span>`:''}
        <a class="chip" href="${contactoUrl}" target="_blank">👤 Odoo</a>
        ${arch
          ? `<span class="chip mark" onclick="desarchivar(${d.partner_id})">↩ Recuperar</span>`
          : `<span class="chip arch" onclick="archivar(${d.partner_id})">🗄 Archivar</span>`}
      </div>
      <div class="expand" id="box-ult-${d.partner_id}"><h4>Última compra</h4><div style="font-size:14px">${dias!=null?`El <b>${fmtFecha(d.ultima_compra)}</b> · hace ${dias} días`:'Sin datos'}<br>${pedidoUrl?`<a class="chip" style="margin-top:8px" href="${pedidoUrl}" target="_blank">Abrir pedido ${esc(d.ultimo_pedido_name||'')} →</a>`:`<a class="chip" style="margin-top:8px" href="${contactoUrl}" target="_blank">Ver en Odoo (facturación directa) →</a>`}</div></div>
      <div class="expand" id="box-top-${d.partner_id}"><h4>Productos que más compra (top ${cuantosTop(d)})</h4><div class="ptable" id="topbody-${d.partner_id}"></div></div>
    </div>
    <div class="right">
      ${d.telefono_wa?`<button class="wa" onclick='openModal(${d.partner_id})'><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.9-2-1-.3-.1-.5-.2-.6.1-.2.3-.7 1-.9 1.1-.2.2-.3.2-.6.1-1.5-.7-2.4-1.3-3.4-3-.3-.5.3-.4.7-1.4.1-.2 0-.4 0-.5 0-.2-.6-1.5-.9-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.7.7-1 1.7-1 2.8 0 1.7 1.2 3.3 1.4 3.5.2.2 2.4 3.7 5.9 5 .8.3 1.5.5 2 .7.8.2 1.6.2 2.2.1.7-.1 1.7-.7 2-1.4.2-.6.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/></svg>WhatsApp</button>`:`<span class="telmuted">Sin teléfono</span>`}
      ${d.telefono_wa?`<button class="chat-btn" onclick="verChat(${d.partner_id})" title="Abrir el chat para leer la conversación, sin texto cargado">💬 Ver chat</button>`:''}
      ${!arch?(cont
        ? `<button class="mark-btn done" onclick="desmarcarContactado(${d.partner_id})">✓ Contactado</button>`
        : `<button class="mark-btn" onclick="marcarContactado(${d.partner_id})">Marcar contactado</button>`):''}
    </div>
  </div>`;
}
function toggleTopList(pid) {
  toggleBox('top-' + pid);
  const d = DATA.find(x => x.partner_id === pid);
  const list = (PRODS[pid] || []).slice(0, cuantosTop(d));
  document.getElementById('topbody-' + pid).innerHTML = list.length
    ? list.map(p => `<div class="pitem"><span class="pn">${esc(cleanProd(p.product_name))}</span><span class="pv">${p.veces_comprado}× · ${fmtMoney(p.monto_total)}</span></div>`).join('')
    : '<div style="color:var(--muted)">Sin productos</div>';
}

// ─── Contactados / Archivados ───
function renderContactados() {
  const rows = DATA
    .filter(d => estaContactado(d.partner_id) && !estaArchivado(d.partner_id))
    .sort((a,b) => new Date(ESTADO[b.partner_id].contactado_at) - new Date(ESTADO[a.partner_id].contactado_at));
  document.getElementById('count-cont').textContent = rows.length + ' contactado' + (rows.length!==1?'s':'') + ` · se reactivan solos tras ${DIAS_CONTACTADO} días`;
  document.getElementById('list-cont').innerHTML = rows.length
    ? '<div class="list">' + rows.map(d => rowHtml(d)).join('') + '</div>'
    : '<div class="empty-view">Todavía no marcaste a nadie como contactado.</div>';
}
function renderArchivados() {
  const rows = DATA.filter(d => estaArchivado(d.partner_id));
  document.getElementById('count-arch').textContent = rows.length + ' archivado' + (rows.length!==1?'s':'');
  document.getElementById('list-arch').innerHTML = rows.length
    ? '<div class="list">' + rows.map(d => rowHtml(d)).join('') + '</div>'
    : '<div class="empty-view">No hay clientes archivados.</div>';
}

function buildMsg(d) {
  const nombre = (d.nombre || '').split(' ')[0];
  const tp = topProd(d.partner_id);
  if (d.segmento === 'nunca_compro')
    return `Hola ${nombre}! Te escribimos de ${EMPRESA}. Tenemos toda la línea profesional de cosmética disponible con tu lista de precios. ¿Querés que te pasemos novedades y stock?`;
  if (tp)
    return `Hola ${nombre}! Te escribimos de ${EMPRESA}. Hace un tiempo no hacés tu pedido y queríamos saber si necesitás reponer ${tp.toLowerCase()} u otros productos. Tenemos stock disponible. ¿Te preparamos un pedido?`;
  return `Hola ${nombre}! Te escribimos de ${EMPRESA}. Hace un tiempo no hacés tu pedido — ¿necesitás reponer stock? Estamos para ayudarte.`;
}
let MODAL_PID = null;
function openModal(pid) {
  const d = DATA.find(x => x.partner_id === pid); if (!d) return;
  MODAL_PID = pid;
  document.getElementById('modalWho').textContent = d.nombre + ' · +' + d.telefono_wa;
  document.getElementById('modalText').value = buildMsg(d);
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modalSend').onclick = () => {
  const d = DATA.find(x => x.partner_id === MODAL_PID);
  const txt = encodeURIComponent(document.getElementById('modalText').value);
  window.open('https://wa.me/' + d.telefono_wa + '?text=' + txt, '_blank');
  closeModal();
  pendingContact = MODAL_PID;
  document.getElementById('confirmName').textContent = d.nombre;
  document.getElementById('confirm').classList.add('show');
};

async function doSync() {
  const b = document.getElementById('btnSync');
  b.classList.add('spin');
  document.getElementById('btnSyncTxt').textContent = 'Sincronizando…';
  try {
    await fetch(window.SUPABASE_URL + '/rest/v1/rpc/iniciar_sync_completo', {
      method: 'POST',
      headers: {
        apikey: window.SUPABASE_KEY,
        Authorization: 'Bearer ' + window.SUPABASE_KEY,
        'Content-Type': 'application/json',
      },
      body: '{}',
    });
    document.getElementById('btnSyncTxt').textContent = 'Actualizando en segundo plano…';
    // El sync completo tarda varios minutos; recargamos cada 30s un rato para ir reflejando avances.
    let veces = 0;
    const iv = setInterval(async () => {
      veces++; await load();
      if (veces >= 10) {
        clearInterval(iv);
        b.classList.remove('spin');
        document.getElementById('btnSyncTxt').textContent = 'Sincronizar';
      }
    }, 30000);
    setTimeout(() => { b.classList.remove('spin'); }, 3000);
  } catch(e) {
    b.classList.remove('spin');
    document.getElementById('btnSyncTxt').textContent = 'Sincronizar';
    alert('No se pudo iniciar la sincronización: ' + e.message);
  }
}

document.getElementById('q').oninput      = e => { filtro.q = e.target.value; renderLista(); };
document.getElementById('orden').onchange = e => { filtro.orden = e.target.value; renderLista(); };
document.getElementById('fwa').onchange   = e => { filtro.fwa = e.target.value; renderLista(); };
document.getElementById('modal').onclick  = e => { if (e.target.id === 'modal') closeModal(); };

load();
</script>
</body>
